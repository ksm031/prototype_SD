<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CHOMP CHAIN</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0a0a14;
      display: flex; justify-content: center; align-items: flex-start;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #app {
      width: 360px; height: 640px;
      position: absolute;
      transform-origin: top left;
      overflow: hidden;
    }
    /* ── screens ── */
    .screen {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e; gap: 18px; padding: 32px 22px;
    }
    .screen.active { display: flex; }
    /* ── canvas (game) ── */
    #gc { display: none; position: absolute; inset: 0; }
    /* ── main screen ── */
    .title {
      font-size: 34px; font-weight: 900; color: #f0c040;
      text-shadow: 0 0 20px rgba(240,192,64,.55);
      letter-spacing: 2px; text-align: center;
    }
    .sub { font-size: 12px; color: #505070; text-align: center; margin-top: -10px; }
    .stats-box {
      width: 100%; background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1); border-radius: 13px;
      padding: 16px 22px; display: flex; flex-direction: column; gap: 9px;
    }
    .stat-row { display: flex; justify-content: space-between; color: #9090b0; font-size: 14px; }
    .stat-row b { color: #f0c040; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: transform .1s, opacity .1s;
    }
    .btn:active { transform: scale(.96); opacity: .85; }
    .btn-p { background: linear-gradient(135deg, #f0c040, #c88820); color: #1a1a2e; }
    .btn-s {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1); color: #6868a0; font-size: 14px;
    }
    /* ── shop ── */
    .shop-tab {
      padding: 10px; border: none; font-size: 14px; cursor: pointer;
      background: rgba(255,255,255,.04); color: #606080; font-weight: 600;
      transition: background .15s, color .15s;
    }
    .shop-tab-active { background: rgba(240,192,64,.15); color: #f0c040; }
    #sh-upgrade { flex-direction: column; gap: 10px; }
    /* ── result screen ── */
    .res-box {
      width: 100%; background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1); border-radius: 13px;
      padding: 18px 22px; display: flex; flex-direction: column; gap: 11px;
    }
    .res-row { display: flex; justify-content: space-between; color: #9090b0; font-size: 14px; }
    .res-row b { color: #f0c040; font-size: 17px; }
  </style>
</head>
<body>
<div id="app">

  <!-- MAIN -->
  <div id="ms" class="screen active">
    <div class="title">CHOMP CHAIN</div>
    <div class="sub">블록을 탭해 캐릭터를 먹여라!</div>
    <div class="stats-box">
      <div class="stat-row"><span>⚡ 최고 연쇄</span><b id="m-hs">0콤보</b></div>
      <div class="stat-row"><span>💰 보유 골드</span><b id="m-gold">0 G</b></div>
      <div class="stat-row"><span>🧪 재료</span><b id="m-mats" style="font-size:13px">—</b></div>
    </div>
    <div style="width:100%">
      <div style="color:#505070;font-size:12px;margin-bottom:7px;text-align:center">색상 수 (많을수록 어려움)</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-s col-btn" id="col-3" onclick="setColors(3)" style="flex:1;padding:10px;font-size:13px">🟥🟦🟨<br><span style="font-size:11px">3색 쉬움</span></button>
        <button class="btn btn-s col-btn" id="col-4" onclick="setColors(4)" style="flex:1;padding:10px;font-size:13px">🟥🟦🟨🟩<br><span style="font-size:11px">4색 보통</span></button>
        <button class="btn btn-s col-btn" id="col-5" onclick="setColors(5)" style="flex:1;padding:10px;font-size:13px">🟥🟦🟨🟩🟪<br><span style="font-size:11px">5색 어려움</span></button>
      </div>
    </div>
    <button class="btn btn-p" onclick="startGame()">🎮 플레이</button>
    <button class="btn btn-s" onclick="showShop()">⚗️ 강화</button>
  </div>

  <!-- SHOP -->
  <div id="ss" class="screen" style="justify-content:flex-start;padding-top:18px;gap:10px">
    <div class="title" style="font-size:22px">강화</div>
    <div class="stats-box" style="padding:10px 16px;gap:4px">
      <div style="display:flex;justify-content:space-between">
        <span style="font-weight:700;color:#f0c040;font-size:14px" id="sh-gold">0 G 🪙</span>
      </div>
      <div style="font-size:12px;color:#9090b0" id="sh-mats-line">재료 없음</div>
    </div>
    <div style="width:100%;display:flex;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.1)">
      <button id="tab-up"  onclick="shopTab('upgrade')" class="shop-tab shop-tab-active" style="flex:1">강화</button>
      <button id="tab-dec" onclick="shopTab('deco')"    class="shop-tab"                 style="flex:1">꾸미기</button>
    </div>
    <div id="sh-upgrade" style="width:100%"></div>
    <div id="sh-deco" style="display:none;width:100%;text-align:center;color:#505070;padding:30px 0;font-size:13px">
      Lv.4 달성 시 꾸미기 해금됩니다
    </div>
    <button class="btn btn-s" onclick="showMain()" style="margin-top:auto">← 돌아가기</button>
  </div>

  <!-- GAME -->
  <canvas id="gc" width="360" height="640"></canvas>

  <!-- RESULT -->
  <div id="rs" class="screen">
    <div class="title" id="r-title" style="font-size:26px">세션 종료!</div>
    <div class="res-box">
      <div class="res-row"><span>💥 소멸 블록</span><b><span id="r-blk">0</span>개</b></div>
      <div class="res-row"><span>⚡ 최대 연쇄</span><b><span id="r-combo">0</span>콤보</b></div>
      <div class="res-row"><span>💰 획득 골드</span><b><span id="r-gold">0</span> G</b></div>
      <div class="res-row"><span>🏆 최고 기록</span><b><span id="r-best">0</span>콤보</b></div>
      <div class="res-row" id="r-mats-row" style="display:none">
        <span>🧪 획득 재료</span>
        <b><span id="r-mats"></span></b>
      </div>
    </div>
    <button class="btn btn-p" onclick="startGame()">🔄 다시 하기</button>
    <button class="btn btn-s" onclick="showMain()">🏠 메인으로</button>
  </div>

</div>
<script>
// ═══════════════════════════════════════
//  RESIZE / SCALE
// ═══════════════════════════════════════
const AW = 360, AH = 640;

function resizeApp() {
  const scale = Math.min(window.innerWidth / AW, window.innerHeight / AH);
  const app = document.getElementById('app');
  const left = (window.innerWidth  - AW * scale) / 2;
  const top  = (window.innerHeight - AH * scale) / 2;
  app.style.transform = `scale(${scale})`;
  app.style.left = Math.max(0, left) + 'px';
  app.style.top  = Math.max(0, top)  + 'px';
}
resizeApp();
window.addEventListener('resize', resizeApp);

// ═══════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════
const COLS = 5, ROWS = 6, CELL = 56;
const GX = (AW - COLS * CELL) / 2;   // grid offset X = 40
const GY = 58;                         // grid offset Y
const ALL_COLORS = ['red', 'blue', 'yellow', 'green', 'purple'];
const BCOLOR = { red: '#e74c3c', blue: '#3498db', yellow: '#f1c40f', green: '#2ecc71', purple: '#9b59b6' };
const BDARK  = { red: '#922b21', blue: '#1a5276', yellow: '#9a7d0a', green: '#1a7a43', purple: '#5b2c6f' };
const BRIGHT = { red: '#f1948a', blue: '#7fb3d3', yellow: '#f9e79f', green: '#a9dfbf', purple: '#d2b4de' };

let colorCount = 4;
let COLORS = ALL_COLORS.slice(0, colorCount);

function setColors(n) {
  colorCount = n;
  COLORS = ALL_COLORS.slice(0, n);
  document.querySelectorAll('.col-btn').forEach(b => {
    b.style.borderColor = '';
    b.style.color = '';
  });
  const sel = document.getElementById('col-' + n);
  if (sel) { sel.style.borderColor = '#f0c040'; sel.style.color = '#f0c040'; }
}

const BASE_X   = AW / 2;
const BASE_Y   = GY + ROWS * CELL + 55;   // ≈ 449
const CHAR_SPD = 10;       // px per frame (at 60fps)
const CHAIN_MS = 50;       // ms between block pops
const SESSION  = 90;
const FRAME_MS = 80;       // ms per sprite frame

// ── CHOMPY 스프라이트 ──────────────────────
const SPR = {};
(function loadSprites() {
  const names = ['idle_01','jump01','jump02','jump03','jump04','jump05','jump06','jump07','jump08'];
  for (const n of names) {
    const img = new Image();
    img.src = `res/chompy/${n}.png`;
    SPR[n] = img;
  }
})();

const SK = { gold: 'cc_gold', hs: 'cc_hs', mats: 'cc_mats', chars: 'cc_chars' };

// ── 캐릭터 스탯 ────────────────────────────
const LEVEL_BONUS = {
  1: { hpAdd: 0, impactAdd: 0, delayReduce: 0,  scale: 1.0 },
  2: { hpAdd: 1, impactAdd: 0, delayReduce: 0,  scale: 1.0 },
  3: { hpAdd: 2, impactAdd: 1, delayReduce: 5,  scale: 1.2 },
  4: { hpAdd: 4, impactAdd: 1, delayReduce: 10, scale: 1.2 },
  5: { hpAdd: 7, impactAdd: 2, delayReduce: 15, scale: 1.4 },
};
const UPGRADE_COST = {
  1: { gold: 200,  anyMat: 10, mainMat: 0,  rare: 0  },
  2: { gold: 500,  anyMat: 0,  mainMat: 20, rare: 0  },
  3: { gold: 1200, anyMat: 0,  mainMat: 40, rare: 5  },
  4: { gold: 3000, anyMat: 0,  mainMat: 80, rare: 15 },
};
function getCharLevel(id)      { return +(JSON.parse(localStorage.getItem(SK.chars)||'{}')[id]||1); }
function saveCharLevel(id, lv) { const d=JSON.parse(localStorage.getItem(SK.chars)||'{}'); d[id]=lv; localStorage.setItem(SK.chars,JSON.stringify(d)); }
function getCharacterStats(lv) {
  const b = LEVEL_BONUS[lv];
  return { hp: 3+b.hpAdd, impactRange: 1+b.impactAdd, chainDelay: Math.max(30, 50-b.delayReduce), scale: b.scale };
}

const DEFAULT_MATS = { red: 0, blue: 0, yellow: 0, green: 0, purple: 0 };
const getMats = () => Object.assign({}, DEFAULT_MATS, JSON.parse(localStorage.getItem(SK.mats) || '{}'));
const saveMats = v => localStorage.setItem(SK.mats, JSON.stringify(v));

function addMats(gained) {
  const cur = getMats();
  for (const k of Object.keys(DEFAULT_MATS)) cur[k] = (cur[k] || 0) + (gained[k] || 0);
  saveMats(cur);
  return cur;
}

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');

let gstate  = 'idle';  // idle | playing | over
let grid    = [];
let char    = {};

let timeLeft = SESSION, timerID = null;
let sGold = 0, sBlocks = 0, sMaxCombo = 0;
let sDestroyed = { red: 0, blue: 0, yellow: 0, green: 0, purple: 0 };
let slowFactor = 1.0, lastTS = 0, rafID = null;
let locked = false;  // input lock during chain

// Visual fx
let shakeFr = 0, shakeAmt = 0;
let popups    = [];  // { x,y,text,color,life,vy,big }
let particles = [];  // { x,y,vx,vy,r,color,life }
let ripples   = [];  // { x,y,rad,life } — wave 시각화

// ═══════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════
const getGold = () => +(localStorage.getItem(SK.gold) || 0);
const getHS   = () => +(localStorage.getItem(SK.hs)   || 0);
const saveGold = v => localStorage.setItem(SK.gold, v);
const saveHS   = v => localStorage.setItem(SK.hs,   v);

// ═══════════════════════════════════════
//  SCREEN
// ═══════════════════════════════════════
function showScreen(id) {
  ['ms','rs','ss'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = 'none';
    el.classList.remove('active');
  });
  canvas.style.display = 'none';
  if (id === 'gc') {
    canvas.style.display = 'block';
  } else {
    const el = document.getElementById(id);
    el.style.display = 'flex';
    el.classList.add('active');
  }
}

function showMain() {
  stopGame();
  document.getElementById('m-hs').textContent   = getHS() + '콤보';
  document.getElementById('m-gold').textContent = getGold() + ' G';

  const COLOR_ICON = { red: '🔴', blue: '🔵', yellow: '🟡', green: '🟢', purple: '🟣' };
  const mats = getMats();
  const parts = Object.entries(mats).filter(([, v]) => v > 0).map(([k, v]) => `${COLOR_ICON[k]}${v}`);
  document.getElementById('m-mats').textContent = parts.length ? parts.join(' ') : '—';

  showScreen('ms');
  setColors(colorCount);
}

// ═══════════════════════════════════════
//  GRID
// ═══════════════════════════════════════
function mkBlock(color) {
  return { color: color || COLORS[Math.floor(Math.random() * COLORS.length)], chainId: -1, hp: 1, animY: null, fallV: 0 };
}

function initGrid() {
  grid = Array.from({ length: ROWS }, () =>
    Array.from({ length: COLS }, () => mkBlock())
  );
  buildChains();
}

function buildChains() {
  const vis = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
  let id = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!vis[r][c] && grid[r][c]) {
        bfs(r, c, id++, vis);
      }
    }
  }
}

function bfs(sr, sc, id, vis) {
  const color = grid[sr][sc].color;
  const q = [[sr, sc]];
  while (q.length) {
    const [r, c] = q.shift();
    if (vis[r][c]) continue;
    vis[r][c] = true;
    grid[r][c].chainId = id;
    for (const [nr, nc] of [[r-1,c],[r+1,c],[r,c-1],[r,c+1]]) {
      if (inB(nr, nc) && !vis[nr][nc] && grid[nr][nc]?.color === color)
        q.push([nr, nc]);
    }
  }
}

function getChain(id) {
  const res = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c]?.chainId === id) res.push({ r, c });
  return res;
}

function inB(r, c) { return r >= 0 && r < ROWS && c >= 0 && c < COLS; }

function removeBlock(r, c) {
  if (!grid[r][c]) return;
  const color = grid[r][c].color;
  burstParticles(r, c, BCOLOR[color]);
  if (sDestroyed[color] !== undefined) sDestroyed[color]++;
  grid[r][c] = null;
}

function gravity() {
  // 현재 시각 Y 고정 (이동 전에 저장)
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] && grid[r][c].animY === null)
        grid[r][c].animY = GY + r * CELL;

  for (let c = 0; c < COLS; c++) {
    let empty = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c]) {
        grid[empty][c] = grid[r][c];
        if (empty !== r) grid[r][c] = null;
        empty--;
      }
    }
    // 새 블록은 그리드 위에서 낙하 시작
    let spawnY = GY - CELL;
    for (let r = empty; r >= 0; r--) {
      const blk = mkBlock();
      blk.animY = spawnY;
      spawnY -= CELL;
      grid[r][c] = blk;
    }
  }
  buildChains();
}

function updateBlockAnims(dt) {
  const spd = dt / 16.67;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const blk = grid[r][c];
      if (!blk) continue;
      const targetY = GY + r * CELL;
      if (blk.animY === null) { blk.animY = targetY; continue; }
      if (blk.animY >= targetY - 0.5) { blk.animY = targetY; blk.fallV = 0; continue; }
      blk.fallV += 0.65 * spd;
      blk.animY = Math.min(targetY, blk.animY + blk.fallV * spd);
    }
  }
}

// ═══════════════════════════════════════
//  CHARACTER
// ═══════════════════════════════════════
function initChar() {
  const lv    = getCharLevel('chompy');
  const stats = getCharacterStats(lv);
  char = {
    x: BASE_X, y: BASE_Y,
    tx: BASE_X, ty: BASE_Y,
    state: 'idle',
    hp: stats.hp, maxHp: stats.hp,
    impactRange: stats.impactRange,
    chainDelay:  stats.chainDelay,
    charScale:   stats.scale,
    level: lv,
    tr: -1, tc: -1,
    sc: 1.0,
    sprFrame: 'idle_01',
    frameT: 0,
  };
}

function goBase() {
  char.tx = BASE_X;
  char.ty = BASE_Y;
  char.state = 'returning';
}

function updateChar(dt) {
  if (char.sc > 1.0) char.sc = Math.max(1.0, char.sc - 0.05);
  const s = char.state;

  // ── 스프라이트 프레임 진행 ──────────────
  char.frameT += dt;
  if (s === 'idle' || s === 'stunned') {
    char.sprFrame = 'idle_01';
    char.frameT = 0;
  } else if (s === 'moving') {
    // jump01→04: 준비→발사→상승→고점
    const fi = Math.min(3, Math.floor(char.frameT / FRAME_MS));
    char.sprFrame = `jump0${fi + 1}`;
  } else if (s === 'eating') {
    char.sprFrame = 'jump04'; // 고점 유지
  } else if (s === 'returning') {
    // jump05→06: 떨어짐
    const fi = Math.min(1, Math.floor(char.frameT / FRAME_MS));
    char.sprFrame = `jump0${fi + 5}`;
  } else if (s === 'landing') {
    // jump07→08: 랜딩→회복
    const fi = Math.min(1, Math.floor(char.frameT / FRAME_MS));
    char.sprFrame = fi === 0 ? 'jump07' : 'jump08';
  }

  if (s === 'idle' || s === 'eating' || s === 'stunned' || s === 'landing') return;

  const dx = char.tx - char.x;
  const dy = char.ty - char.y;
  const d  = Math.sqrt(dx * dx + dy * dy);
  const spd = CHAR_SPD * (dt / 16.67);

  if (d < spd) {
    char.x = char.tx; char.y = char.ty;
    if (s === 'moving') {
      char.state = 'eating';
      char.frameT = 0;
      startEat(char.tr, char.tc);
    } else if (s === 'returning') {
      // 랜딩 애니메이션 후 idle로
      char.state = 'landing';
      char.frameT = 0;
      setTimeout(() => {
        char.state = 'idle';
        char.frameT = 0;
        locked = false;
      }, FRAME_MS * 2 + 40);
    }
  } else {
    char.x += (dx / d) * spd;
    char.y += (dy / d) * spd;
  }
}

// ═══════════════════════════════════════
//  EAT & CHAIN
// ═══════════════════════════════════════
function startEat(r, c) {
  char.sc = 1.5;
  const block = grid[r][c];

  if (!block) {
    // Empty cell hit
    char.hp--;
    char.state = 'stunned';
    shake(6, 18);
    haptic([15, 5, 15]);
    popup(char.x, char.y - 44, 'OW!', '#ff5555');
    setTimeout(() => {
      goBase();
      checkOver();
    }, 750);
    return;
  }

  const chain = getChain(block.chainId);

  if (chain.length === 1) {
    // Lonely block — penalty
    char.hp--;
    removeBlock(r, c);
    sBlocks++;
    sGold += 10;
    popup(char.x, char.y - 44, '…', '#888899');
    char.state = 'returning';
    setTimeout(() => { gravity(); goBase(); checkOver(); }, 300);
    return;
  }

  runChain(chain, r, c);
}

function byDist(blocks, sr, sc) {
  return [...blocks].sort((a, b) =>
    (Math.abs(a.r - sr) + Math.abs(a.c - sc)) - (Math.abs(b.r - sr) + Math.abs(b.c - sc))
  );
}

function runChain(chainBlocks, sr, sc) {
  const ordered = byDist(chainBlocks, sr, sc);
  // 체인 블록 위치 집합 (wave 피해 수집 시 제외용)
  const chainSet = new Set(chainBlocks.map(b => b.r * COLS + b.c));
  const waveMap  = new Map(); // key → {r,c}  wave 피해 블록 수집
  let combo = 0;
  char.state = 'eating';

  const iv = setInterval(() => {
    if (!ordered.length) {
      clearInterval(iv);
      // Phase 3: 체인 주변 인접 블록 한꺼번에 처리
      for (const { r, c } of waveMap.values()) {
        if (!grid[r][c]) continue;
        ripples.push({ x: GX + c * CELL + CELL / 2, y: GY + r * CELL + CELL / 2, rad: 4, life: 0.8 });
        removeBlock(r, c);
        combo++;
        sBlocks++;
        sGold += 10;
      }
      finishChain(combo);
      return;
    }

    // Phase 1 & 2: 선택 블록 → 도미노 확산
    const { r, c } = ordered.shift();
    if (!grid[r][c]) return;
    removeBlock(r, c);
    combo++;
    sBlocks++;
    sGold += 10;
    shake(2, 3);  // 블록 팝마다 약한 진동
    haptic(8);
    ripples.push({ x: GX + c * CELL + CELL / 2, y: GY + r * CELL + CELL / 2, rad: CELL * 0.25, life: 1.0 });

    // wave 피해 블록 수집 (impactRange 칸 범위)
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      for (let i = 1; i <= char.impactRange; i++) {
        const nr = r + dr*i, nc = c + dc*i;
        if (!inB(nr, nc) || !grid[nr][nc]) break;
        const key = nr * COLS + nc;
        if (!chainSet.has(key)) waveMap.set(key, { r: nr, c: nc });
      }
    }

    if (combo >= 5) {
      popup(GX + c * CELL + CELL / 2, GY + r * CELL - 8, combo + '!', '#f0c040');
    }
  }, char.chainDelay);
}

function finishChain(combo) {
  if (combo > sMaxCombo) sMaxCombo = combo;
  if (combo >= 5) sGold += combo * 5;

  if (combo >= 20) {
    shake(18, 40);
    haptic([50, 15, 80, 15, 50]);
    bigPopup('LEGENDARY!!', '#c084fc');
    burstStar(AW / 2, AH / 2 - 40);
  } else if (combo >= 10) {
    shake(12, 28);
    haptic([30, 10, 50]);
    bigPopup('CHOMP!!', '#ff4444');
  } else if (combo >= 5) {
    shake(5, 14);
    haptic([20, 10, 30]);
    bigPopup('COMBO!', '#f0c040');
  }

  setTimeout(() => {
    gravity();
    goBase();
    checkOver();
  }, 200);
}

// ═══════════════════════════════════════
//  GAME OVER
// ═══════════════════════════════════════
function checkOver() {
  if (gstate !== 'playing') return;
  if (char.hp <= 0) { endGame('hp'); return; }
  if (grid.flat().every(b => !b)) endGame('clear');
}

function endGame(reason) {
  if (gstate !== 'playing') return;
  gstate = 'over';
  clearInterval(timerID);

  if (reason === 'clear') {
    sGold += 100;
    bigPopup('PERFECT!!', '#7ec850');
  } else if (reason === 'hp') {
    shake(14, 30);
  }
  slowFactor = 0.2;
  setTimeout(() => { slowFactor = 1.0; showResult(); }, 1600);
}

// ═══════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════
function startTimer() {
  timeLeft = SESSION;
  timerID = setInterval(() => {
    if (slowFactor < 1.0) return;
    timeLeft--;
    if (timeLeft <= 0) {
      clearInterval(timerID);
      if (gstate === 'playing') endGame('time');
    }
  }, 1000);
}

// ═══════════════════════════════════════
//  EFFECTS
// ═══════════════════════════════════════
function shake(amt, fr) { shakeAmt = amt; shakeFr = fr; }
function haptic(ms = 10) { navigator.vibrate?.(ms); }

function popup(x, y, text, color, big) {
  popups.push({ x, y, text, color, life: 1.2, vy: -1.0, big: !!big });
}
function bigPopup(text, color) {
  popups.push({ x: AW / 2, y: AH / 2 - 70, text, color, life: 1.8, vy: -0.4, big: true });
}

function burstStar(x, y) {
  const colors = ['#c084fc', '#f0c040', '#ff4444', '#7ec850', '#3498db'];
  for (let i = 0; i < 28; i++) {
    const a = (i / 28) * Math.PI * 2 + Math.random() * 0.4;
    const spd = 3 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
                     r: 4 + Math.random() * 4, color: colors[i % colors.length], life: 1.4 });
  }
}

function burstParticles(r, c, color) {
  const x = GX + c * CELL + CELL / 2;
  const y = GY + r * CELL + CELL / 2;
  for (let i = 0; i < 9; i++) {
    const a = (i / 9) * Math.PI * 2;
    const spd = 2 + Math.random() * 3.5;
    particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
                     r: 3 + Math.random() * 3, color, life: 1.0 });
  }
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function rRect(x, y, w, h, rad) {
  ctx.beginPath();
  ctx.moveTo(x + rad, y);
  ctx.lineTo(x + w - rad, y);
  ctx.arcTo(x + w, y, x + w, y + rad, rad);
  ctx.lineTo(x + w, y + h - rad);
  ctx.arcTo(x + w, y + h, x + w - rad, y + h, rad);
  ctx.lineTo(x + rad, y + h);
  ctx.arcTo(x, y + h, x, y + h - rad, rad);
  ctx.lineTo(x, y + rad);
  ctx.arcTo(x, y, x + rad, y, rad);
  ctx.closePath();
}

function render(dt) {
  // Shake offset
  let ox = 0, oy = 0;
  if (shakeFr > 0) {
    ox = (Math.random() - 0.5) * shakeAmt;
    oy = (Math.random() - 0.5) * shakeAmt;
    shakeFr--;
  }

  ctx.save();
  ctx.translate(ox, oy);

  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(-20, -20, AW + 40, AH + 40);

  drawGrid();
  drawRipples();
  drawChar();
  drawParticles();
  drawHUD();
  drawPopups();

  ctx.restore();
}

function drawHUD() {
  // BG
  ctx.fillStyle = 'rgba(10,10,22,0.8)';
  ctx.fillRect(0, 0, AW, 52);

  // Timer
  const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
  ctx.fillStyle = timeLeft <= 10 ? '#ff5555' : '#f0c040';
  ctx.font = 'bold 16px system-ui';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(`⏱ ${m}:${String(s).padStart(2, '0')}`, 12, 28);

  // HP hearts
  ctx.font = '15px serif';
  ctx.textAlign = 'center';
  let hp = '';
  for (let i = 0; i < char.maxHp; i++) hp += i < char.hp ? '❤️' : '🖤';
  ctx.fillText(hp, AW / 2, 28);

  // Gold
  ctx.fillStyle = '#f0c040';
  ctx.font = 'bold 15px system-ui';
  ctx.textAlign = 'right';
  ctx.fillText(sGold + ' G', AW - 12, 28);
}

function drawGrid() {
  const csz = {};
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c]) { const id = grid[r][c].chainId; csz[id] = (csz[id]||0) + 1; }

  const now = Date.now();

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x  = GX + c * CELL;
      const ly = GY + r * CELL;   // 논리 Y (빈 칸 슬롯용)
      const pad = 3;

      // Empty slot
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      rRect(x + pad, ly + pad, CELL - pad*2, CELL - pad*2, 6);
      ctx.fill();

      const blk = grid[r][c];
      if (!blk) continue;

      const bc = BCOLOR[blk.color];
      const bd = BDARK[blk.color];
      const bl = BRIGHT[blk.color];
      const chained = (csz[blk.chainId] || 0) >= 2;

      // 낙하 애니메이션 Y + 체인 bob
      const atRest = blk.animY === null || blk.animY >= ly - 0.5;
      const bobY   = (chained && atRest)
        ? Math.sin(now / 700 + blk.chainId * 0.9) * 1.8
        : 0;
      const y = (blk.animY !== null ? blk.animY : ly) + bobY;

      // Block body
      ctx.fillStyle = bc;
      rRect(x + pad, y + pad, CELL - pad*2, CELL - pad*2, 8);
      ctx.fill();

      // Top shine
      ctx.fillStyle = bl;
      rRect(x + pad, y + pad, CELL - pad*2, 7, [8, 8, 0, 0]);
      ctx.fill();

      // Bottom shadow
      ctx.fillStyle = bd;
      rRect(x + pad, y + CELL - pad - 6, CELL - pad*2, 6, [0, 0, 8, 8]);
      ctx.fill();

      // Chain border — pulse 효과
      if (chained) {
        const pulse = 0.3 + 0.18 * Math.sin(now / 380 + blk.chainId * 1.1);
        ctx.strokeStyle = `rgba(255,255,255,${pulse})`;
        ctx.lineWidth = 2;
        rRect(x + pad, y + pad, CELL - pad*2, CELL - pad*2, 8);
        ctx.stroke();

        const cnt = csz[blk.chainId];
        if (cnt >= 3) {
          ctx.fillStyle = 'rgba(0,0,0,0.55)';
          ctx.beginPath();
          ctx.arc(x + CELL - pad - 2, y + pad + 2, 8, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 9px system-ui';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(cnt, x + CELL - pad - 2, y + pad + 2.5);
        }
      }
    }
  }
}

function drawChar() {
  const img = SPR[char.sprFrame];
  if (!img || !img.complete) return;

  const SIZE = 56 * (char.charScale || 1.0);
  const sc = char.sc;
  ctx.save();
  ctx.translate(char.x, char.y);
  ctx.scale(sc, sc);
  ctx.drawImage(img, -SIZE / 2, -SIZE / 2, SIZE, SIZE);

  // Stun stars
  if (char.state === 'stunned') {
    const t = Date.now() / 180;
    ctx.font = '13px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < 3; i++) {
      const a = t + (i / 3) * Math.PI * 2;
      ctx.fillText('⭐', Math.cos(a) * 26, Math.sin(a) * 16 - 30);
    }
  }
  ctx.restore();
}

function drawParticles() {
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x  += p.vx * slowFactor;
    p.y  += p.vy * slowFactor;
    p.vy += 0.18 * slowFactor;
    p.life -= 0.04 * slowFactor;
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawRipples() {
  ripples = ripples.filter(r => r.life > 0);
  for (const rpl of ripples) {
    rpl.rad  += 2.8 * slowFactor;
    rpl.life -= 0.06 * slowFactor;
    ctx.strokeStyle = `rgba(255,255,255,${Math.max(0, rpl.life) * 0.7})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(rpl.x, rpl.y, rpl.rad, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawPopups() {
  popups = popups.filter(p => p.life > 0);
  for (const p of popups) {
    p.y    += p.vy * slowFactor;
    p.life -= 0.028 * slowFactor;
    ctx.globalAlpha = Math.min(1, p.life);
    ctx.font = p.big ? 'bold 40px system-ui' : 'bold 21px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(0,0,0,0.85)';
    ctx.lineWidth   = p.big ? 6 : 3;
    ctx.strokeText(p.text, p.x, p.y);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════
function loop(ts) {
  if (gstate === 'idle') return;
  const raw = ts - (lastTS || ts);
  const dt  = raw * slowFactor;
  lastTS = ts;

  updateChar(dt);
  updateBlockAnims(dt);
  render(dt);
  rafID = requestAnimationFrame(loop);
}

// ═══════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════
function blocksFalling() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const blk = grid[r][c];
      if (blk && blk.animY !== null && blk.animY < GY + r * CELL - 0.5) return true;
    }
  return false;
}

function handleTap(cx, cy) {
  if (gstate !== 'playing') return;
  if (char.state !== 'idle' || locked) return;
  if (blocksFalling()) return;  // 낙하 중엔 탭 무시

  const rect   = canvas.getBoundingClientRect();
  const scaleX = AW / rect.width;
  const scaleY = AH / rect.height;
  const px = (cx - rect.left) * scaleX;
  const py = (cy - rect.top)  * scaleY;

  const col = Math.floor((px - GX) / CELL);
  const row = Math.floor((py - GY) / CELL);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;

  char.tr = row; char.tc = col;
  char.tx = GX + col * CELL + CELL / 2;
  char.ty = GY + row * CELL + CELL / 2;
  char.state = 'moving';
  locked = true;
}

canvas.addEventListener('click', e => handleTap(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  handleTap(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

// ═══════════════════════════════════════
//  START / STOP
// ═══════════════════════════════════════
function stopGame() {
  cancelAnimationFrame(rafID);
  clearInterval(timerID);
  gstate = 'idle';
}

function startGame() {
  stopGame();
  gstate = 'playing';
  sGold = 0; sBlocks = 0; sMaxCombo = 0;
  sDestroyed = { red: 0, blue: 0, yellow: 0, green: 0, purple: 0 };
  slowFactor = 1.0; lastTS = 0; locked = false;
  particles = []; popups = []; ripples = [];
  shakeFr = 0; shakeAmt = 0;

  initGrid();
  initChar();
  startTimer();
  showScreen('gc');
  rafID = requestAnimationFrame(loop);
}

function showResult() {
  const earned  = Math.max(10, sGold);
  const newGold = getGold() + earned;
  const newBest = Math.max(getHS(), sMaxCombo);
  saveGold(newGold);
  saveHS(newBest);

  document.getElementById('r-blk').textContent   = sBlocks;
  document.getElementById('r-combo').textContent  = sMaxCombo;
  document.getElementById('r-best').textContent   = newBest;

  // 재료 정산 (블록 5개당 1개)
  const COLOR_ICON = { red: '🔴', blue: '🔵', yellow: '🟡', green: '🟢', purple: '🟣' };
  const gainedMats = {};
  for (const [color, cnt] of Object.entries(sDestroyed)) {
    const g = Math.floor(cnt / 5);
    if (g > 0) gainedMats[color] = g;
  }
  addMats(gainedMats);

  const matParts = [];
  for (const [color, cnt] of Object.entries(gainedMats)) {
    if (cnt > 0) matParts.push(`${COLOR_ICON[color]}+${cnt}`);
  }
  const matsRow = document.getElementById('r-mats-row');
  if (matParts.length > 0) {
    document.getElementById('r-mats').textContent = matParts.join('  ');
    matsRow.style.display = 'flex';
  } else {
    matsRow.style.display = 'none';
  }

  // Animate gold
  let d = 0;
  const step = Math.max(1, Math.ceil(earned / 40));
  const gel  = document.getElementById('r-gold');
  const anim = setInterval(() => {
    d = Math.min(d + step, earned);
    gel.textContent = d;
    if (d >= earned) clearInterval(anim);
  }, 40);

  showScreen('rs');
}

// ═══════════════════════════════════════
//  SHOP / UPGRADE
// ═══════════════════════════════════════
const CICON = { red:'🔴', blue:'🔵', yellow:'🟡', green:'🟢', purple:'🟣' };

function canUpgrade() {
  const lv = getCharLevel('chompy');
  if (lv >= 5) return { ok: false, reason: '최대 레벨' };
  const cost = UPGRADE_COST[lv];
  const gold = getGold(), mats = getMats();
  if (gold < cost.gold) return { ok: false, reason: `골드 부족 (${cost.gold - gold}G)` };
  if (cost.anyMat > 0) {
    const tot = mats.red + mats.blue + mats.yellow + mats.green + mats.purple;
    if (tot < cost.anyMat) return { ok: false, reason: `재료 부족 (${cost.anyMat - tot}개)` };
  }
  if (cost.mainMat > 0 && mats.yellow < cost.mainMat)
    return { ok: false, reason: `🟡 부족 (${cost.mainMat - mats.yellow}개)` };
  if (cost.rare > 0 && mats.rare < cost.rare)
    return { ok: false, reason: `⭐ 부족 (${cost.rare - mats.rare}개)` };
  return { ok: true };
}

function doUpgrade() {
  const check = canUpgrade();
  if (!check.ok) return;
  const lv   = getCharLevel('chompy');
  const cost = UPGRADE_COST[lv];
  const mats = getMats();
  saveGold(getGold() - cost.gold);
  if (cost.anyMat > 0) {
    let need = cost.anyMat;
    for (const k of ['red','blue','yellow','green','purple']) {
      const take = Math.min(need, mats[k]||0);
      mats[k] -= take; need -= take;
      if (!need) break;
    }
  }
  if (cost.mainMat > 0) mats.yellow -= cost.mainMat;
  if (cost.rare  > 0)   mats.rare   -= cost.rare;
  saveMats(mats);
  saveCharLevel('chompy', lv + 1);
  renderUpgradeTab();
}

function shopTab(tab) {
  document.getElementById('sh-upgrade').style.display = tab === 'upgrade' ? 'flex' : 'none';
  document.getElementById('sh-deco').style.display    = tab === 'deco'    ? 'block' : 'none';
  document.getElementById('tab-up').classList.toggle('shop-tab-active',  tab === 'upgrade');
  document.getElementById('tab-dec').classList.toggle('shop-tab-active', tab === 'deco');
}

function renderUpgradeTab() {
  const lv   = getCharLevel('chompy');
  const gold = getGold(), mats = getMats();
  const cur  = getCharacterStats(lv);

  document.getElementById('sh-gold').textContent = gold.toLocaleString() + ' G 🪙';
  const matStr = Object.entries(mats).filter(([k,v])=>k!=='rare'&&v>0).map(([k,v])=>`${CICON[k]}${v}`).join(' ');
  document.getElementById('sh-mats-line').textContent = (matStr||'재료 없음') + (mats.rare>0 ? '  ⭐'+mats.rare : '');

  const el = document.getElementById('sh-upgrade');
  if (lv >= 5) {
    el.innerHTML = `<div style="text-align:center;padding:24px 0">
      <div style="font-size:52px">👾</div>
      <div style="color:#f0c040;font-weight:700;font-size:18px;margin-top:8px">먹깨비 Lv.5 MAX</div>
      <div style="color:#505070;font-size:13px;margin-top:6px">모든 강화 완료!</div></div>`;
    return;
  }

  const nlv  = lv + 1;
  const next = getCharacterStats(nlv);
  const cost = UPGRADE_COST[lv];
  const chk  = canUpgrade();

  // 스탯 변화
  const diffs = [];
  if (next.hp !== cur.hp) diffs.push(`체력 ${cur.hp} → <b style="color:#7ec850">${next.hp}</b>`);
  if (next.impactRange !== cur.impactRange) diffs.push(`충격파 ${cur.impactRange} → <b style="color:#7ec850">${next.impactRange}칸</b>`);
  if (next.chainDelay  !== cur.chainDelay)  diffs.push(`연쇄 속도 ${cur.chainDelay} → <b style="color:#7ec850">${next.chainDelay}ms</b>`);
  if (next.scale !== cur.scale) diffs.push(`크기 × <b style="color:#7ec850">${next.scale}</b>`);

  // 필요 조건
  function req(label, have, need) {
    const ok = have >= need;
    return `<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:13px">
      <span style="color:#9090b0">${label}</span>
      <span style="color:${ok?'#7ec850':'#ff5555'}">${ok?'✅':'❌'} ${have}/${need}</span></div>`;
  }
  let reqHtml = req(`💰 골드`, gold, cost.gold);
  if (cost.anyMat > 0) {
    const tot = mats.red+mats.blue+mats.yellow+mats.green+mats.purple;
    reqHtml += req('🧪 아무 재료', tot, cost.anyMat);
  }
  if (cost.mainMat > 0) reqHtml += req('🟡 순수 조각', mats.yellow, cost.mainMat);
  if (cost.rare    > 0) reqHtml += req('⭐ 공명 조각', mats.rare,   cost.rare);

  el.innerHTML = `
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:44px">👾</div>
      <div style="color:#f0c040;font-weight:700;font-size:16px;margin-top:4px">먹깨비 Lv.${lv}</div>
    </div>
    <div class="stats-box" style="padding:11px 15px;gap:5px">
      <div style="color:#9090b0;font-size:11px;margin-bottom:2px">Lv.${nlv} 달성 시 변화</div>
      ${diffs.length ? diffs.map(d=>`<div style="font-size:13px;color:#ccc">${d}</div>`).join('') : '<div style="font-size:13px;color:#606080">외형 변화만</div>'}
    </div>
    <div class="stats-box" style="padding:11px 15px;gap:2px">
      <div style="color:#9090b0;font-size:11px;margin-bottom:4px">필요 조건</div>
      ${reqHtml}
    </div>
    <button class="btn ${chk.ok?'btn-p':'btn-s'}" onclick="doUpgrade()"
      ${chk.ok?'':'style="opacity:.5;cursor:not-allowed"'}>
      ${chk.ok ? `Lv.${nlv}로 강화!` : chk.reason}
    </button>`;
}

function showShop() {
  stopGame();
  showScreen('ss');
  shopTab('upgrade');
  renderUpgradeTab();
}

showMain();
