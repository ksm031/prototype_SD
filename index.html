<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CHOMP CHAIN</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0a0a14;
      display: flex; justify-content: center; align-items: flex-start;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #app {
      width: 360px; height: 520px;
      position: absolute;
      transform-origin: top left;
      overflow: hidden;
    }
    /* ── screens ── */
    .screen {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e; gap: 18px; padding: 32px 22px;
    }
    .screen.active { display: flex; }
    /* ── canvas (game) ── */
    #gc { display: none; position: absolute; inset: 0; }
    /* ── main screen ── */
    .title {
      font-size: 34px; font-weight: 900; color: #f0c040;
      text-shadow: 0 0 20px rgba(240,192,64,.55);
      letter-spacing: 2px; text-align: center;
    }
    .sub { font-size: 12px; color: #505070; text-align: center; margin-top: -10px; }
    .stats-box {
      width: 100%; background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1); border-radius: 13px;
      padding: 16px 22px; display: flex; flex-direction: column; gap: 9px;
    }
    .stat-row { display: flex; justify-content: space-between; color: #9090b0; font-size: 14px; }
    .stat-row b { color: #f0c040; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: transform .1s, opacity .1s;
    }
    .btn:active { transform: scale(.96); opacity: .85; }
    .btn-p { background: linear-gradient(135deg, #f0c040, #c88820); color: #1a1a2e; }
    .btn-s {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1); color: #6868a0; font-size: 14px;
    }
    /* ── reset popup ── */
    #reset-popup {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
    }
    #reset-popup.hidden { display: none; }
    .reset-popup-box {
      background: #1a1a2e; border: 1px solid rgba(255,255,255,.15);
      border-radius: 16px; padding: 24px 20px; width: 300px;
      display: flex; flex-direction: column; gap: 12px;
    }
    /* ── shop ── */
    .shop-tab {
      padding: 10px; border: none; font-size: 14px; cursor: pointer;
      background: rgba(255,255,255,.04); color: #606080; font-weight: 600;
      transition: background .15s, color .15s;
    }
    .shop-tab-active { background: rgba(240,192,64,.15); color: #f0c040; }
    #sh-upgrade { flex-direction: column; gap: 10px; }
    /* ── result screen ── */
    .res-box {
      width: 100%; background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1); border-radius: 13px;
      padding: 18px 22px; display: flex; flex-direction: column; gap: 11px;
    }
    .res-row { display: flex; justify-content: space-between; color: #9090b0; font-size: 14px; }
    .res-row b { color: #f0c040; font-size: 17px; }
    /* ── pause button ── */
    #pause-btn {
      display: none; position: absolute; top: 12px; right: 12px;
      z-index: 10; width: 40px; height: 40px; border: none; border-radius: 10px;
      background: rgba(255,255,255,.15); backdrop-filter: blur(4px);
      color: #fff; font-size: 18px; cursor: pointer;
      transition: background .15s, transform .1s;
    }
    #pause-btn:active { transform: scale(.9); }
  </style>
</head>
<body>
<div id="app">

  <!-- MAIN -->
  <div id="ms" class="screen active">
    <div class="title">CHOMP CHAIN</div>
    <div class="sub">블록을 탭해 캐릭터를 먹여라!</div>
    <div class="stats-box">
      <div class="stat-row"><span>⏳ 최장 생존</span><b id="m-hs">0초</b></div>
      <div class="stat-row"><span>💰 보유 골드</span><b id="m-gold">0 G</b></div>
      <div class="stat-row"><span>🧪 재료</span><b id="m-mats" style="font-size:13px">—</b></div>
    </div>
<button class="btn btn-p" onclick="startGame()">🎮 플레이</button>
    <button class="btn btn-s" onclick="showShop()">⚗️ 강화</button>
  </div>

  <!-- SHOP -->
  <div id="ss" class="screen" style="justify-content:flex-start;padding-top:18px;gap:10px;overflow-y:auto;-webkit-overflow-scrolling:touch">
    <div class="title" style="font-size:22px">강화</div>
    <div class="stats-box" style="padding:10px 16px;gap:4px">
      <div style="display:flex;justify-content:space-between">
        <span style="font-weight:700;color:#f0c040;font-size:14px" id="sh-gold">0 G 🪙</span>
      </div>
      <div style="font-size:12px;color:#9090b0" id="sh-mats-line">재료 없음</div>
    </div>
    <div style="width:100%;display:flex;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.1)">
      <button id="tab-up"  onclick="shopTab('upgrade')" class="shop-tab shop-tab-active" style="flex:1">강화</button>
      <button id="tab-dec" onclick="shopTab('deco')"    class="shop-tab"                 style="flex:1">꾸미기</button>
    </div>
    <div id="sh-upgrade" style="width:100%"></div>
    <div id="sh-deco" style="display:none;width:100%;text-align:center;color:#505070;padding:30px 0;font-size:13px">
      Lv.4 달성 시 꾸미기 해금됩니다
    </div>
    <button class="btn btn-s" onclick="showMain()" style="margin-top:auto">← 돌아가기</button>
    <button class="btn btn-s" onclick="openResetPopup()" style="margin-top:4px;color:#ff5555;border-color:rgba(255,85,85,.3)">🗑️ 저장 초기화</button>
  </div>

  <!-- RESET POPUP -->
  <div id="reset-popup" class="hidden">
    <div class="reset-popup-box">
      <div style="font-size:16px;font-weight:700;color:#e0e0f0;text-align:center">🗑️ 초기화</div>
      <div style="font-size:12px;color:#9090b0;text-align:center;line-height:1.6">삭제할 데이터를 선택해주세요</div>
      <button class="btn btn-s" onclick="doReset('progress')" style="color:#ffaa55;border-color:rgba(255,170,85,.3);font-size:13px;padding:12px">
        💰 강화 초기화<br><span style="font-size:11px;color:#707090;font-weight:400">골드 · 재료 · 강화 수치 삭제<br>기록은 유지</span>
      </button>
      <button class="btn btn-s" onclick="doReset('all')" style="color:#ff5555;border-color:rgba(255,85,85,.3);font-size:13px;padding:12px">
        💀 전체 초기화<br><span style="font-size:11px;color:#707090;font-weight:400">강화 + 최고 기록 전부 삭제</span>
      </button>
      <button class="btn btn-s" onclick="closeResetPopup()" style="font-size:13px;padding:10px">취소</button>
    </div>
  </div>

  <!-- GAME -->
  <canvas id="gc" width="360" height="520"></canvas>
  <button id="pause-btn" onclick="togglePause()">⏸</button>

  <!-- RESULT -->
  <div id="rs" class="screen">
    <div class="title" id="r-title" style="font-size:26px">세션 종료!</div>
    <div class="res-box">
      <div class="res-row"><span>⏳ 생존 시간</span><b><span id="r-time">0</span>초</b></div>
      <div class="res-row"><span>💥 소멸 블록</span><b><span id="r-blk">0</span>개</b></div>
      <div class="res-row"><span>⚡ 최대 연쇄</span><b><span id="r-combo">0</span>콤보</b></div>
      <div class="res-row"><span>💰 획득 골드</span><b><span id="r-gold">0</span> G</b></div>
      <div class="res-row"><span>🏆 최장 생존</span><b><span id="r-best">0</span>초</b></div>
      <div class="res-row" id="r-mats-row" style="display:none">
        <span>🧪 획득 재료</span>
        <b><span id="r-mats"></span></b>
      </div>
    </div>
    <button class="btn btn-p" onclick="startGame()">🔄 다시 하기</button>
    <button class="btn btn-s" onclick="showMain()">🏠 메인으로</button>
  </div>

</div>
<script>
// ═══════════════════════════════════════
//  RESIZE / SCALE
// ═══════════════════════════════════════
const AW = 360, AH = 520;

function resizeApp() {
  const scale = Math.min(window.innerWidth / AW, window.innerHeight / AH);
  const app = document.getElementById('app');
  const left = (window.innerWidth  - AW * scale) / 2;
  const top  = (window.innerHeight - AH * scale) / 2;
  app.style.transform = `scale(${scale})`;
  app.style.left = Math.max(0, left) + 'px';
  app.style.top  = Math.max(0, top)  + 'px';
}
resizeApp();
window.addEventListener('resize', resizeApp);

// ═══════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════
const COLS = 6, ROWS = 7, CELL = 50;
const GX = (AW - COLS * CELL) / 2;   // grid offset X = 40
const GY = 64;                         // grid offset Y
const ALL_COLORS = ['red', 'blue', 'yellow', 'green', 'purple'];
const BCOLOR = { red: '#e74c3c', blue: '#3498db', yellow: '#f1c40f', green: '#2ecc71', purple: '#9b59b6', legendary: '#f0c040', firework: '#ff7f2a', bomb: '#7c6fcd', steel: '#5a6473' };
const BDARK  = { red: '#922b21', blue: '#1a5276', yellow: '#9a7d0a', green: '#1a7a43', purple: '#5b2c6f', legendary: '#a07010', firework: '#b35000', bomb: '#3d3370', steel: '#2e3440' };
const BRIGHT = { red: '#f1948a', blue: '#7fb3d3', yellow: '#f9e79f', green: '#a9dfbf', purple: '#d2b4de', legendary: '#fffacc', firework: '#ffb87a', bomb: '#c4b8f5', steel: '#aab4c2' };

let colorCount = 3;
let COLORS = ALL_COLORS.slice(0, colorCount);

// 시간 기반 단계: 0-60s=3색, 60-120s=4색, 120-180s=5색, 180s+=HYPER
const PHASE_DEFS = [
  { minSec: 0,   colors: 3, label: 'PHASE 1', color: '#7ec850', bg: 'res/bg/phase1.png', steelInterval: 20000 },
  { minSec: 60,  colors: 4, label: 'PHASE 2', color: '#f0c040', bg: 'res/bg/phase2.png', steelInterval: 13000 },
  { minSec: 120, colors: 5, label: 'PHASE 3', color: '#ff8844', bg: 'res/bg/phase3.png', steelInterval: 8000  },
  { minSec: 180, colors: 5, label: 'HYPER',   color: '#ff3366', bg: 'res/bg/phase4.png', steelInterval: 4000  },
];

// 배경 이미지 프리로드
const BG_IMGS = PHASE_DEFS.map(p => { const img = new Image(); img.src = p.bg; return img; });
let currentPhase = 0;
let hyperPulseTimer  = 0;   // ms since last pulse
let hyperPulseActive = false;
let hyperPulseRemain = 0;   // ms left in active pulse
const PULSE_INTERVAL = 15000;
const PULSE_DURATION = 3000;

function getPhase(secElapsed) {
  for (let i = PHASE_DEFS.length - 1; i >= 0; i--)
    if (secElapsed >= PHASE_DEFS[i].minSec) return i;
  return 0;
}

function updatePhase() {
  const sec = gameElapsed / 1000;
  const p   = getPhase(sec);
  if (p !== currentPhase) {
    currentPhase = p;
    const def = PHASE_DEFS[p];
    colorCount = def.colors;
    COLORS = ALL_COLORS.slice(0, colorCount);
    bigPopup(def.label + '!', def.color);
    shake(6, 8);
  }
}

const BASE_X   = AW / 2;
const BASE_Y   = GY + ROWS * CELL + 55;   // ≈ 449
// CHAR_SPD 제거 — 이동 시간(ms) 고정 방식으로 대체
const CHAIN_MS = 50;       // ms between block pops
// SESSION 제거됨 — HP 드레인으로 대체
const FRAME_MS = 80;       // ms per sprite frame

// ── CHOMPY 스프라이트 ──────────────────────
const SPR = {};
(function loadSprites() {
  const names = ['idle_01','jump01','jump02','jump03','jump04','jump05','jump06','jump07','jump08'];
  for (const n of names) {
    const img = new Image();
    img.src = `res/chompy/${n}.png`;
    SPR[n] = img;
  }
})();

const SK = { gold: 'cc_gold', hs: 'cc_hs', mats: 'cc_mats', stats: 'cc_stats' };
const COLOR_ICON    = { red: '🔴', blue: '🔵', yellow: '🟡', green: '🟢', purple: '🟣' };
const MAX_PARTICLES = 300;
const MAX_RIPPLES   = 40;
const MAX_POPUPS    = 20;
const BOMB_RADIUS   = 2;

const COMBO_MILESTONES = [
  { threshold: 30, shakeAmt: 18, shakeFr: 40, haptic: [50, 15, 80, 15, 50], text: 'LEGENDARY!!', color: '#c084fc', isStar: true },
  { threshold: 10, shakeAmt: 12, shakeFr: 28, haptic: [30, 10, 50],          text: 'CHOMP!!',     color: '#ff4444' },
  { threshold:  5, shakeAmt:  5, shakeFr: 14, haptic: [20, 10, 30],          text: 'COMBO!',      color: '#f0c040' },
];

const ITEM_DROP_TIERS = [
  { threshold: 15, type: 'bomb'     },
  { threshold:  8, type: 'firework' },
];

// ── 개별 스탯 정의 ────────────────────────
const STATS = {
  recovery: { name:'회복력', icon:'💚', desc:'블록 파괴 시 HP 회복량',
    tiers:[
      { value:3.0 },
      { value:4.5,  gold:200,  mat:{ yellow:10 } },
      { value:6.0,  gold:500,  mat:{ yellow:25 } },
      { value:8.0,  gold:1200, mat:{ yellow:50, rare:3 } },
      { value:11.0, gold:3000, mat:{ yellow:100, rare:10 } },
    ]
  },
  impact: { name:'충격파', icon:'💥', desc:'연쇄 충격 범위 (칸)',
    tiers:[
      { value:1 },
      { value:2, gold:300, mat:{ red:15 } },
      { value:3, gold:900, mat:{ red:40, rare:5 } },
    ]
  },
  speed: { name:'연쇄 속도', icon:'⚡', desc:'연쇄 간격 ms (낮을수록 빠름)',
    tiers:[
      { value:50 },
      { value:40, gold:250, mat:{ blue:15 } },
      { value:30, gold:700, mat:{ blue:35 } },
      { value:22, gold:1800, mat:{ blue:70, rare:8 } },
    ]
  },
  vitality: { name:'생명력', icon:'🛡️', desc:'HP 드레인 저항 (높을수록 좋음)',
    tiers:[
      { value:1.00 },
      { value:0.82, gold:300, mat:{ green:15 } },
      { value:0.65, gold:800, mat:{ green:35 } },
      { value:0.50, gold:2000, mat:{ green:70, rare:10 } },
    ]
  },
  movespeed: { name:'이동 속도', icon:'🦶', desc:'블록까지 이동 시간 ms (낮을수록 빠름)',
    tiers:[
      { value:420 },
      { value:340, gold:300,  mat:{ blue:15 } },
      { value:270, gold:800,  mat:{ blue:35 } },
      { value:210, gold:2000, mat:{ blue:70, rare:8 } },
    ]
  },
  maxhp: { name:'최대 체력', icon:'❤️', desc:'최대 HP (회복량도 비례 증가)',
    tiers:[
      { value:100 },
      { value:130, gold:400,  mat:{ green:20 } },
      { value:170, gold:1000, mat:{ green:50, rare:5 } },
      { value:220, gold:2500, mat:{ green:90, rare:15 } },
    ]
  },
};

const DEFAULT_STAT_LEVELS = { recovery:0, impact:0, speed:0, vitality:0, maxhp:0, movespeed:0 };
const getStatLevels  = () => Object.assign({}, DEFAULT_STAT_LEVELS, JSON.parse(localStorage.getItem(SK.stats)||'{}'));
const saveStatLevels = v  => localStorage.setItem(SK.stats, JSON.stringify(v));
function getStatLevel(id)       { return getStatLevels()[id] || 0; }
function saveStatLevel(id, lv)  { const d = getStatLevels(); d[id] = lv; saveStatLevels(d); }
function getStatValue(id)       { const lv = getStatLevel(id); return STATS[id].tiers[lv].value; }

const DEFAULT_MATS = { red: 0, blue: 0, yellow: 0, green: 0, purple: 0 };
const getMats = () => Object.assign({}, DEFAULT_MATS, JSON.parse(localStorage.getItem(SK.mats) || '{}'));
const saveMats = v => localStorage.setItem(SK.mats, JSON.stringify(v));

function addMats(gained) {
  const cur = getMats();
  for (const k of Object.keys(DEFAULT_MATS)) cur[k] = (cur[k] || 0) + (gained[k] || 0);
  saveMats(cur);
  return cur;
}

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');

let gstate  = 'idle';  // idle | playing | paused | over
let grid    = [];
let char    = {};

let gameElapsed = 0;  // ms, slowFactor 무관 누적
let sGold = 0, sBlocks = 0, sMaxCombo = 0;
let sDestroyed = { red: 0, blue: 0, yellow: 0, green: 0, purple: 0 };
let slowFactor = 1.0, lastTS = 0, rafID = null;
let locked = false;  // input lock during chain
let steelSpawnTimer = 0; // ms until next steel block spawn
let targetChainId = -1;  // 탭 시 강조할 체인 ID
let pendingTimers = new Set();

// Visual fx
let shakeFr = 0, shakeAmt = 0;
let popups    = [];  // { x,y,text,color,life,vy,big }
let particles = [];  // { x,y,vx,vy,r,color,life }
let ripples   = [];  // { x,y,rad,life } — wave 시각화
let flashes   = [];  // { x,y,w,h,color,life } — AoE area flash

// ═══════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════
const getGold = () => +(localStorage.getItem(SK.gold) || 0);
const getHS   = () => +(localStorage.getItem(SK.hs)   || 0);
const saveGold = v => localStorage.setItem(SK.gold, v);
const saveHS   = v => localStorage.setItem(SK.hs,   v);

// ═══════════════════════════════════════
//  SCREEN
// ═══════════════════════════════════════
function showScreen(id) {
  ['ms','rs','ss'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = 'none';
    el.classList.remove('active');
  });
  canvas.style.display = 'none';
  document.getElementById('pause-btn').style.display = 'none';
  if (id === 'gc') {
    canvas.style.display = 'block';
    document.getElementById('pause-btn').style.display = 'flex';
    document.getElementById('pause-btn').style.alignItems = 'center';
    document.getElementById('pause-btn').style.justifyContent = 'center';
  } else {
    const el = document.getElementById(id);
    el.style.display = 'flex';
    el.classList.add('active');
  }
}

function showMain() {
  stopGame();
  document.getElementById('m-hs').textContent   = getHS() + '초';
  document.getElementById('m-gold').textContent = getGold() + ' G';

  const mats = getMats();
  const parts = Object.entries(mats).filter(([k, v]) => k !== 'rare' && v > 0).map(([k, v]) => `${COLOR_ICON[k]}${v}`);
  if (mats.rare > 0) parts.push(`⭐${mats.rare}`);
  document.getElementById('m-mats').textContent = parts.length ? parts.join(' ') : '—';

  showScreen('ms');
  setColors(colorCount);
}

// ═══════════════════════════════════════
//  GRID
// ═══════════════════════════════════════
function mkBlock(color) {
  if (!color && Math.random() < 0.002) color = 'legendary';
  return { color: color || COLORS[Math.floor(Math.random() * COLORS.length)], chainId: -1, hp: 1, animY: null, fallV: 0 };
}

function initGrid() {
  grid = Array.from({ length: ROWS }, () =>
    Array.from({ length: COLS }, () => mkBlock())
  );
  buildChains();
}

function buildChains() {
  const vis = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
  let id = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!vis[r][c] && grid[r][c]) {
        bfs(r, c, id++, vis);
      }
    }
  }
}

function bfs(sr, sc, id, vis) {
  const color = grid[sr][sc].color;
  const q = [[sr, sc]];
  while (q.length) {
    const [r, c] = q.shift();
    if (vis[r][c]) continue;
    vis[r][c] = true;
    grid[r][c].chainId = id;
    if (color === 'legendary' || grid[r][c].item || grid[r][c].steel) continue; // legendary/item/steel은 혼자만 체인
    for (const [nr, nc] of [[r-1,c],[r+1,c],[r,c-1],[r,c+1]]) {
      if (inB(nr, nc) && !vis[nr][nc] && grid[nr][nc]?.color === color)
        q.push([nr, nc]);
    }
  }
}

function getChain(id) {
  const res = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c]?.chainId === id) res.push({ r, c });
  return res;
}

function inB(r, c) { return r >= 0 && r < ROWS && c >= 0 && c < COLS; }

function removeBlock(r, c) {
  if (!grid[r][c]) return;
  const blk = grid[r][c];
  const color = blk.color;
  if (blk.steel) {
    // 강철 블럭은 일반 공격 면역 — 클랭 이펙트만
    ripples.push({ x: GX + c * CELL + CELL / 2, y: GY + r * CELL + CELL / 2, rad: CELL * 0.4, life: 0.6 });
    shake(3, 4);
    popup(GX + c * CELL + CELL / 2, GY + r * CELL - 4, '🔒', '#aab4c2');
    return;
  }
  burstParticles(r, c, BCOLOR[color] || '#ffffff');
  if (blk.item === 'firework') {
    grid[r][c] = null;
    triggerFirework(r, c);
    return;
  }
  if (blk.item === 'bomb') {
    grid[r][c] = null;
    triggerBomb(r, c);
    return;
  }
  if (color === 'legendary') {
    const m = getMats(); m.rare = (m.rare || 0) + 1; saveMats(m);
    spawnStarBurst(GX + c * CELL + CELL / 2, GY + r * CELL + CELL / 2);
    popups.push({ x: GX + c * CELL + CELL / 2, y: GY + r * CELL, text: '⭐ +1', color: '#ffe066', life: 1.0, vy: -1.8, big: true });
  } else if (sDestroyed[color] !== undefined) {
    sDestroyed[color]++;
  }
  grid[r][c] = null;
}

function gravity() {
  // 현재 시각 Y 고정 (이동 전에 저장)
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] && grid[r][c].animY === null)
        grid[r][c].animY = GY + r * CELL;

  for (let c = 0; c < COLS; c++) {
    let empty = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c]) {
        grid[empty][c] = grid[r][c];
        if (empty !== r) grid[r][c] = null;
        empty--;
      }
    }
    // 새 블록은 그리드 위에서 낙하 시작
    let spawnY = GY - CELL;
    for (let r = empty; r >= 0; r--) {
      const blk = mkBlock();
      blk.animY = spawnY;
      spawnY -= CELL;
      grid[r][c] = blk;
    }
  }
  buildChains();
}

function updateBlockAnims(dt) {
  const spd = dt / 16.67;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const blk = grid[r][c];
      if (!blk) continue;
      const targetY = GY + r * CELL;
      if (blk.animY === null) { blk.animY = targetY; continue; }
      if (blk.animY >= targetY - 0.5) { blk.animY = targetY; blk.fallV = 0; continue; }
      blk.fallV += 0.65 * spd;
      blk.animY = Math.min(targetY, blk.animY + blk.fallV * spd);
    }
  }
}

// ═══════════════════════════════════════
//  CHARACTER
// ═══════════════════════════════════════
function initChar() {
  char = {
    x: BASE_X, y: BASE_Y,
    tx: BASE_X, ty: BASE_Y,
    state: 'idle',
    maxHp: getStatValue('maxhp'),
    hp:    getStatValue('maxhp'),
    hpPerBlock:  getStatValue('recovery') * getStatValue('maxhp') / 100,
    impactRange: getStatValue('impact'),
    chainDelay:  getStatValue('speed'),
    drainMult:   getStatValue('vitality'),
    travelMs:    getStatValue('movespeed'),
    moveSpd:     0,
    charScale:   1.0,
    tr: -1, tc: -1,
    sc: 1.0,
    sprFrame: 'idle_01',
    frameT: 0,
  };
}

function goBase() {
  char.tx = BASE_X;
  char.ty = BASE_Y;
  const d0 = Math.sqrt((char.tx - char.x) ** 2 + (char.ty - char.y) ** 2);
  char.moveSpd = d0 / char.travelMs * 16.67;
  char.state = 'returning';
}

function updateChar(dt) {
  if (char.sc > 1.0) char.sc = Math.max(1.0, char.sc - 0.05);
  const s = char.state;

  // ── 스프라이트 프레임 진행 ──────────────
  char.frameT += dt;
  if (s === 'idle' || s === 'stunned') {
    char.sprFrame = 'idle_01';
    char.frameT = 0;
  } else if (s === 'moving') {
    // jump01→04: 준비→발사→상승→고점
    const fi = Math.min(3, Math.floor(char.frameT / FRAME_MS));
    char.sprFrame = `jump0${fi + 1}`;
  } else if (s === 'eating') {
    char.sprFrame = 'jump04'; // 고점 유지
  } else if (s === 'returning') {
    // jump05→06: 떨어짐
    const fi = Math.min(1, Math.floor(char.frameT / FRAME_MS));
    char.sprFrame = `jump0${fi + 5}`;
  } else if (s === 'landing') {
    // jump07→08: 랜딩→회복
    const fi = Math.min(1, Math.floor(char.frameT / FRAME_MS));
    char.sprFrame = fi === 0 ? 'jump07' : 'jump08';
  }

  if (s === 'idle' || s === 'eating' || s === 'stunned' || s === 'landing') return;

  const dx = char.tx - char.x;
  const dy = char.ty - char.y;
  const d  = Math.sqrt(dx * dx + dy * dy);
  const spd = char.moveSpd * (dt / 16.67);

  if (d < spd) {
    char.x = char.tx; char.y = char.ty;
    if (s === 'moving') {
      char.state = 'eating';
      char.frameT = 0;
      startEat(char.tr, char.tc);
    } else if (s === 'returning') {
      // 랜딩 애니메이션 후 idle로
      char.state = 'landing';
      char.frameT = 0;
      safeTimeout(() => {
        char.state = 'idle';
        char.frameT = 0;
        locked = false;
      }, FRAME_MS * 2 + 40);
    }
  } else {
    char.x += (dx / d) * spd;
    char.y += (dy / d) * spd;
  }
}

// ═══════════════════════════════════════
//  EAT & CHAIN
// ═══════════════════════════════════════
function startEat(r, c) {
  targetChainId = -1;
  char.sc = 1.5;
  const block = grid[r][c];

  if (!block) {
    // Empty cell hit
    char.hp = Math.max(0, char.hp - 10);
    char.state = 'stunned';
    shake(6, 18);
    haptic([15, 5, 15]);
    popup(char.x, char.y - 44, 'OW!', '#ff5555');
    safeTimeout(() => {
      goBase();
      checkOver();
    }, 750);
    return;
  }

  const chain = getChain(block.chainId);

  if (chain.length === 1) {
    removeBlock(r, c);
    sBlocks++;
    sGold += 10;
    popup(char.x, char.y - 44, '…', '#888899');
    char.state = 'returning';
    safeTimeout(() => { gravity(); goBase(); checkOver(); }, 300);
    return;
  }

  runChain(chain, r, c);
}

function byDist(blocks, sr, sc) {
  return [...blocks].sort((a, b) =>
    (Math.abs(a.r - sr) + Math.abs(a.c - sc)) - (Math.abs(b.r - sr) + Math.abs(b.c - sc))
  );
}

function healFromBlock(chainSize) {
  const bonus = Math.max(1.0, 1 + (chainSize - 2) * 0.1);
  char.hp = Math.min(char.maxHp, char.hp + char.hpPerBlock * bonus);
}

function runChain(chainBlocks, sr, sc) {
  const ordered = byDist(chainBlocks, sr, sc);
  // 체인 블록 위치 집합 (wave 피해 수집 시 제외용)
  const chainSet = new Set(chainBlocks.map(b => b.r * COLS + b.c));
  const waveMap  = new Map(); // key → {r,c}  wave 피해 블록 수집
  const chainSize = chainBlocks.length;
  let combo = 0;
  char.state = 'eating';

  const iv = setInterval(() => {
    if (gstate !== 'playing') { clearInterval(iv); return; }
    if (!ordered.length) {
      clearInterval(iv);
      // Phase 3: 체인 주변 인접 블록 한꺼번에 처리
      for (const { r, c } of waveMap.values()) {
        if (!grid[r][c]) continue;
        ripples.push({ x: GX + c * CELL + CELL / 2, y: GY + r * CELL + CELL / 2, rad: 4, life: 0.8 });
        removeBlock(r, c);
        healFromBlock(chainSize);
        combo++;
        sBlocks++;
        sGold += 10;
      }
      finishChain(combo);
      return;
    }

    // Phase 1 & 2: 선택 블록 → 도미노 확산
    const { r, c } = ordered.shift();
    if (!grid[r][c]) return;
    removeBlock(r, c);
    healFromBlock(chainSize);
    combo++;
    sBlocks++;
    sGold += 10;
    shake(2, 3);  // 블록 팝마다 약한 진동
    haptic(8);
    ripples.push({ x: GX + c * CELL + CELL / 2, y: GY + r * CELL + CELL / 2, rad: CELL * 0.25, life: 1.0 });

    // wave 피해 블록 수집 (impactRange 칸 범위)
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      for (let i = 1; i <= char.impactRange; i++) {
        const nr = r + dr*i, nc = c + dc*i;
        if (!inB(nr, nc) || !grid[nr][nc]) break;
        const key = nr * COLS + nc;
        if (!chainSet.has(key)) waveMap.set(key, { r: nr, c: nc });
      }
    }

    if (combo >= 5) {
      popup(GX + c * CELL + CELL / 2, GY + r * CELL - 8, combo + '!', '#f0c040');
    }
  }, char.chainDelay);
}

// ═══════════════════════════════════════
//  STEEL BLOCKS
// ═══════════════════════════════════════
function spawnSteel() {
  // 상단 2행 중 랜덤 열에 강철 블럭 배치
  const candidates = [];
  for (let r = 0; r < 3; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] && !grid[r][c].steel && !grid[r][c].item && grid[r][c].color !== 'legendary') candidates.push({ r, c });
  if (!candidates.length) return;

  const { r, c } = candidates[Math.floor(Math.random() * candidates.length)];
  grid[r][c] = { color: 'steel', steel: true, chainId: -1, hp: 1, animY: grid[r][c].animY, fallV: 0 };
  buildChains();
  shake(4, 6);
  popup(GX + c * CELL + CELL / 2, GY + r * CELL - 8, '⚙️', '#aab4c2', true);
}

// ═══════════════════════════════════════
//  ITEM BLOCKS
// ═══════════════════════════════════════
function clearCells(cells, color) {
  let destroyed = 0;
  for (const [r, c] of cells) {
    if (!inB(r, c) || !grid[r][c]) continue;
    burstParticles(r, c, color);
    grid[r][c] = null;
    destroyed++;
  }
  return destroyed;
}

function triggerFirework(r, c) {
  shake(8, 18);
  haptic([20, 10, 40]);
  bigPopup('🧨 BANG!', '#ff7f2a');
  // 행 전체 가로 플래시
  flashes.push({ x: GX, y: GY + r * CELL, w: COLS * CELL, h: CELL,
                 color: '#ff7f2a', life: 1.0, type: 'row' });
  const cells = Array.from({ length: COLS }, (_, cc) => [r, cc]);
  const destroyed = clearCells(cells, '#ff7f2a');
  for (let i = 0; i < destroyed; i++) healFromBlock(destroyed);
}

function triggerBomb(r, c) {
  shake(16, 32);
  haptic([30, 10, 60, 10, 30]);
  bigPopup('💣 BOOM!!', '#a855f7');
  // 반경 사각형 플래시
  const x1 = GX + Math.max(0, c - BOMB_RADIUS) * CELL;
  const y1 = GY + Math.max(0, r - BOMB_RADIUS) * CELL;
  const x2 = GX + (Math.min(COLS - 1, c + BOMB_RADIUS) + 1) * CELL;
  const y2 = GY + (Math.min(ROWS - 1, r + BOMB_RADIUS) + 1) * CELL;
  flashes.push({ x: x1, y: y1, w: x2 - x1, h: y2 - y1,
                 color: '#a855f7', life: 1.0, type: 'area' });
  const cells = [];
  for (let dr = -BOMB_RADIUS; dr <= BOMB_RADIUS; dr++)
    for (let dc = -BOMB_RADIUS; dc <= BOMB_RADIUS; dc++)
      cells.push([r + dr, c + dc]);
  const destroyed = clearCells(cells, '#a855f7');
  for (let i = 0; i < destroyed; i++) healFromBlock(destroyed);
}

function dropItemBlock(combo) {
  const tier = ITEM_DROP_TIERS.find(t => combo >= t.threshold);
  if (!tier) return;
  const type = tier.type;

  const candidates = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] && !grid[r][c].item && grid[r][c].color !== 'legendary') candidates.push({ r, c });
  if (!candidates.length) return;

  const { r, c } = candidates[Math.floor(Math.random() * candidates.length)];
  grid[r][c].item = type;
  grid[r][c].color = type;
  buildChains();
  popup(GX + c * CELL + CELL / 2, GY + r * CELL - 8, type === 'bomb' ? '💣' : '🧨', '#ffffff', true);
}

function finishChain(combo) {
  if (combo > sMaxCombo) sMaxCombo = combo;
  if (combo >= 5) sGold += combo * 5;

  const milestone = COMBO_MILESTONES.find(m => combo >= m.threshold);
  if (milestone) {
    shake(milestone.shakeAmt, milestone.shakeFr);
    haptic(milestone.haptic);
    bigPopup(milestone.text, milestone.color);
    if (milestone.isStar) burstStar(AW / 2, AH / 2 - 40);
  }

  safeTimeout(() => {
    gravity();
    dropItemBlock(combo);
    goBase();
    checkOver();
  }, 200);
}

// ═══════════════════════════════════════
//  GAME OVER
// ═══════════════════════════════════════
function checkOver() {
  if (gstate !== 'playing') return;
  if (char.hp <= 0) { endGame('hp'); return; }
  if (grid.flat().every(b => !b)) endGame('clear');
}

function endGame(reason) {
  if (gstate !== 'playing') return;
  gstate = 'over';

  if (reason === 'clear') {
    sGold += 100;
    bigPopup('PERFECT!!', '#7ec850');
  } else if (reason === 'hp') {
    shake(14, 30);
    bigPopup('GAME OVER', '#ff5555');
  }
  slowFactor = 0.2;
  safeTimeout(() => { slowFactor = 1.0; showResult(); }, 1600);
}

// ═══════════════════════════════════════
//  EFFECTS
// ═══════════════════════════════════════
function shake(amt, fr) { shakeAmt = amt; shakeFr = fr; }
function haptic(ms = 10) { navigator.vibrate?.(ms); }

function popup(x, y, text, color, big) {
  popups.push({ x, y, text, color, life: 1.2, vy: -1.0, big: !!big });
}
function bigPopup(text, color) {
  popups.push({ x: AW / 2, y: AH / 2 - 70, text, color, life: 1.8, vy: -0.4, big: true });
}

function burstStar(x, y) {
  const colors = ['#c084fc', '#f0c040', '#ff4444', '#7ec850', '#3498db'];
  for (let i = 0; i < 28; i++) {
    const a = (i / 28) * Math.PI * 2 + Math.random() * 0.4;
    const spd = 3 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
                     r: 4 + Math.random() * 4, color: colors[i % colors.length], life: 1.4 });
  }
}

function spawnStarBurst(x, y) {
  const colors = ['#ffe066', '#ffcc00', '#fff5a0', '#ffaa00', '#ffffff'];
  for (let i = 0; i < 24; i++) {
    const a = (i / 24) * Math.PI * 2;
    const spd = 3 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 2,
      r: 3 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1.0,
      isStar: Math.random() < 0.5,
    });
  }
}

function burstParticles(r, c, color) {
  const x = GX + c * CELL + CELL / 2;
  const y = GY + r * CELL + CELL / 2;
  for (let i = 0; i < 9; i++) {
    const a = (i / 9) * Math.PI * 2;
    const spd = 2 + Math.random() * 3.5;
    particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
                     r: 3 + Math.random() * 3, color, life: 1.0 });
  }
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function rRect(x, y, w, h, rad) {
  const [tl, tr, br, bl] = Array.isArray(rad) ? rad : [rad, rad, rad, rad];
  ctx.beginPath();
  ctx.moveTo(x + tl, y);
  ctx.lineTo(x + w - tr, y);
  ctx.arcTo(x + w, y, x + w, y + tr, tr);
  ctx.lineTo(x + w, y + h - br);
  ctx.arcTo(x + w, y + h, x + w - br, y + h, br);
  ctx.lineTo(x + bl, y + h);
  ctx.arcTo(x, y + h, x, y + h - bl, bl);
  ctx.lineTo(x, y + tl);
  ctx.arcTo(x, y, x + tl, y, tl);
  ctx.closePath();
}

function render(dt) {
  const now = Date.now();

  // Shake offset
  let ox = 0, oy = 0;
  if (shakeFr > 0) {
    ox = (Math.random() - 0.5) * shakeAmt;
    oy = (Math.random() - 0.5) * shakeAmt;
    shakeFr--;
  }

  // HYPER 웨이브 왜곡 (화면 좌우 + 상하 흔들림)
  if (currentPhase === 3) {
    ox += Math.sin(now / 350) * (hyperPulseActive ? 5 : 1.5);
    oy += Math.cos(now / 500) * (hyperPulseActive ? 3 : 0.6);
  }

  ctx.save();
  ctx.translate(ox, oy);

  // Background — 페이즈별 배경 이미지
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(-20, -20, AW + 40, AH + 40);
  const bgImg = BG_IMGS[currentPhase];
  if (bgImg && bgImg.complete && bgImg.naturalWidth) {
    ctx.globalAlpha = 0.45;
    ctx.drawImage(bgImg, 0, 0, AW, AH);
    ctx.globalAlpha = 1.0;
  }
  // HYPER 시 붉게 숨쉬는 오버레이
  if (currentPhase === 3) {
    const b = hyperPulseActive
      ? 20 + (Math.abs(Math.sin(now / 70)) * 35 | 0)
      : 10 + (Math.abs(Math.sin(now / 1400)) * 12 | 0);
    ctx.fillStyle = `rgba(${b + 8},8,${b | 0},0.45)`;
    ctx.fillRect(-20, -20, AW + 40, AH + 40);
  }

  drawGrid();
  drawFlashes();
  drawRipples();
  drawChar();
  drawParticles();
  drawHUD();

  // HYPER 오버레이 (전체 화면 빨간 플래시)
  if (currentPhase === 3) {
    const alpha = hyperPulseActive
      ? Math.abs(Math.sin(now / 55)) * 0.28   // 빠른 스트로브
      : Math.abs(Math.sin(now / 1800)) * 0.07; // 잔잔한 붉은 기운
    ctx.fillStyle = `rgba(255,20,55,${alpha.toFixed(3)})`;
    ctx.fillRect(-20, -20, AW + 40, AH + 40);
  }

  drawPopups();
  ctx.restore();
}

function drawHUD() {
  // BG
  ctx.fillStyle = 'rgba(10,10,22,0.88)';
  ctx.fillRect(0, 0, AW, 56);

  const pct = Math.max(0, char.hp / char.maxHp);
  const BAR_X = 8, BAR_Y = 12, BAR_W = AW - 16, BAR_H = 14;

  // HP bar track
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  rRect(BAR_X, BAR_Y, BAR_W, BAR_H, 4);
  ctx.fill();

  // HP bar fill (색상: 초록 → 노랑 → 빨강)
  const barColor = pct > 0.5 ? '#7ec850' : pct > 0.25 ? '#f0c040' : '#ff5555';
  // 깜빡임: hp < 25% 시 점멸
  const blink = pct < 0.25 && Math.floor(Date.now() / 200) % 2 === 0;
  if (!blink && pct > 0) {
    ctx.fillStyle = barColor;
    rRect(BAR_X, BAR_Y, Math.max(8, BAR_W * pct), BAR_H, 4);
    ctx.fill();
  }

  // HP bar border
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  rRect(BAR_X, BAR_Y, BAR_W, BAR_H, 4);
  ctx.stroke();

  // HP % text on bar
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.font = 'bold 10px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(Math.ceil(char.hp) + '%', AW / 2, BAR_Y + BAR_H / 2);

  // 하단 행: 드레인 속도 | 생존 시간 | 골드
  const drainRate = (16.0 + gameElapsed / 1000 * 0.35) * char.drainMult * (hyperPulseActive ? 2.0 : 1.0);
  const secStr    = Math.floor(gameElapsed / 1000) + 's';

  // 페이즈 레이블 (HP 바 위 가운데)
  const pdef = PHASE_DEFS[currentPhase];
  ctx.save();
  ctx.font = 'bold 9px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = pdef.color;
  ctx.fillText(pdef.label, AW / 2, BAR_Y - 4);
  ctx.restore();

  ctx.textBaseline = 'middle';
  ctx.font = '12px system-ui';

  // 드레인 (좌)
  const drainColor = drainRate < 1.0 ? '#7ec850' : drainRate < 1.8 ? '#f0c040' : '#ff5555';
  ctx.fillStyle = drainColor;
  ctx.textAlign = 'left';
  ctx.fillText(`🔥 ${drainRate.toFixed(1)}/s`, BAR_X, 44);

  // 생존 시간 (중앙)
  ctx.fillStyle = '#8888aa';
  ctx.textAlign = 'center';
  ctx.fillText(secStr, AW / 2, 44);

  // 골드 (우)
  ctx.fillStyle = '#f0c040';
  ctx.font = 'bold 12px system-ui';
  ctx.textAlign = 'right';
  ctx.fillText(sGold + ' G', AW - BAR_X, 44);
}

function drawGrid() {
  const csz = {};
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c]) { const id = grid[r][c].chainId; csz[id] = (csz[id]||0) + 1; }

  const now = Date.now();
  const PAD = 3;
  const CR  = 9;  // corner radius

  // 각 블록의 bobY를 미리 계산 (bridge에서도 사용)
  function blkY(r, c) {
    const blk = grid[r][c];
    if (!blk) return GY + r * CELL;
    const ly = GY + r * CELL;
    const atRest = blk.animY === null || blk.animY >= ly - 0.5;
    const chained = (csz[blk.chainId] || 0) >= 2;
    const bob = (chained && atRest) ? Math.sin(now / 700 + blk.chainId * 0.9) * 1.8 : 0;
    return (blk.animY !== null ? blk.animY : ly) + bob;
  }
  function atRest(r, c) {
    const blk = grid[r][c];
    if (!blk) return false;
    const ly = GY + r * CELL;
    return blk.animY === null || blk.animY >= ly - 0.5;
  }
  function sameChain(r, c, r2, c2) {
    if (!inB(r2, c2)) return false;
    const a = grid[r][c], b = grid[r2][c2];
    if (!a || !b || a.chainId === -1) return false;
    return a.chainId === b.chainId && (csz[a.chainId] || 0) >= 2;
  }

  // ── Pass 1: 빈 슬롯 ──
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = GX + c * CELL, ly = GY + r * CELL;
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      rRect(x + PAD, ly + PAD, CELL - PAD*2, CELL - PAD*2, 6);
      ctx.fill();
    }
  }

  // ── Pass 2: 브릿지(블록 간 연결 채움) ──
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const blk = grid[r][c];
      if (!blk) continue;
      const x  = GX + c * CELL;
      const y  = blkY(r, c);
      const ar = atRest(r, c);
      ctx.fillStyle = BCOLOR[blk.color];

      // 오른쪽 브릿지
      if (sameChain(r, c, r, c+1) && ar && atRest(r, c+1)) {
        ctx.fillRect(x + CELL - PAD, y + PAD, PAD * 2, CELL - PAD * 2);
      }
      // 아래 브릿지
      if (sameChain(r, c, r+1, c) && ar && atRest(r+1, c)) {
        const y2 = blkY(r+1, c);
        ctx.fillRect(x + PAD, y + CELL - PAD, CELL - PAD * 2, y2 + PAD - (y + CELL - PAD));
      }
      // 아래-오른쪽 코너 채움 (십자 교차점)
      if (sameChain(r, c, r, c+1) && sameChain(r, c, r+1, c) && ar && atRest(r, c+1) && atRest(r+1, c)) {
        const y2 = blkY(r+1, c);
        ctx.fillRect(x + CELL - PAD, y + CELL - PAD, PAD * 2, y2 + PAD - (y + CELL - PAD));
      }
    }
  }

  // ── Pass 3: 블록 바디 ──
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const blk = grid[r][c];
      if (!blk) continue;

      const x  = GX + c * CELL;
      const y  = blkY(r, c);
      const bc = BCOLOR[blk.color];
      const bd = BDARK[blk.color];
      const blt = BRIGHT[blk.color];
      const chained = (csz[blk.chainId] || 0) >= 2;

      const hasT = sameChain(r, c, r-1, c);
      const hasB = sameChain(r, c, r+1, c);
      const hasL = sameChain(r, c, r, c-1);
      const hasR = sameChain(r, c, r, c+1);

      const radii = [
        (hasT || hasL) ? 1 : CR,  // TL
        (hasT || hasR) ? 1 : CR,  // TR
        (hasB || hasR) ? 1 : CR,  // BR
        (hasB || hasL) ? 1 : CR,  // BL
      ];

      // 블록 바디
      ctx.fillStyle = bc;
      rRect(x + PAD, y + PAD, CELL - PAD*2, CELL - PAD*2, radii);
      ctx.fill();

      // Legendary glow
      if (blk.color === 'legendary') {
        const glowAlpha = 0.18 + 0.12 * Math.sin(now / 300);
        ctx.save();
        ctx.shadowColor = '#ffe066';
        ctx.shadowBlur = 18;
        ctx.strokeStyle = `rgba(255,224,102,${glowAlpha + 0.4})`;
        ctx.lineWidth = 2.5;
        rRect(x + PAD, y + PAD, CELL - PAD*2, CELL - PAD*2, radii);
        ctx.stroke();
        ctx.restore();
      }

      // Steel block — crosshatch + icon
      if (blk.steel) {
        ctx.save();
        // 빗금 패턴
        ctx.strokeStyle = 'rgba(170,180,194,0.25)';
        ctx.lineWidth = 1.5;
        for (let d = -CELL; d < CELL * 2; d += 7) {
          ctx.beginPath();
          ctx.moveTo(x + PAD + d, y + PAD);
          ctx.lineTo(x + PAD + d + CELL, y + PAD + CELL - PAD * 2);
          ctx.stroke();
        }
        // 테두리
        ctx.strokeStyle = '#aab4c2';
        ctx.lineWidth = 2;
        rRect(x + PAD, y + PAD, CELL - PAD*2, CELL - PAD*2, radii);
        ctx.stroke();
        // 아이콘
        ctx.font = 'bold 18px system-ui';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('⚙️', x + CELL / 2, y + CELL / 2);
        ctx.restore();
      }

      // Item block glow + emoji
      if (blk.item) {
        const glowColor = blk.item === 'firework' ? '#ff7f2a' : '#a855f7';
        const pulse = 0.5 + 0.3 * Math.sin(now / 220);
        ctx.save();
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = 14;
        ctx.strokeStyle = glowColor;
        ctx.globalAlpha = pulse;
        ctx.lineWidth = 2.5;
        rRect(x + PAD, y + PAD, CELL - PAD*2, CELL - PAD*2, radii);
        ctx.stroke();
        ctx.globalAlpha = 1.0;
        ctx.shadowBlur = 0;
        ctx.font = 'bold 20px system-ui';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(blk.item === 'firework' ? '🧨' : '💣', x + CELL / 2, y + CELL / 2);
        ctx.restore();
      }

      // 상단 광택 (위에 연결된 블록 없을 때만)
      if (!hasT) {
        ctx.fillStyle = blt;
        rRect(x + PAD, y + PAD, CELL - PAD*2, 7, [radii[0], radii[1], 0, 0]);
        ctx.fill();
      }

      // 하단 그림자 (아래에 연결된 블록 없을 때만)
      if (!hasB) {
        ctx.fillStyle = bd;
        rRect(x + PAD, y + CELL - PAD - 6, CELL - PAD*2, 6, [0, 0, radii[2], radii[3]]);
        ctx.fill();
      }

      // Legendary 별
      if (blk.color === 'legendary') {
        ctx.save();
        ctx.font = 'bold 22px system-ui';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('⭐', x + CELL / 2, y + CELL / 2);
        ctx.restore();
      }

      // 체인 테두리 펄스 (연결 형태 반영)
      if (chained) {
        const pulse = 0.3 + 0.18 * Math.sin(now / 380 + blk.chainId * 1.1);
        ctx.strokeStyle = `rgba(255,255,255,${pulse})`;
        ctx.lineWidth = 2;
        rRect(x + PAD, y + PAD, CELL - PAD*2, CELL - PAD*2, radii);
        ctx.stroke();
      }
    }
  }

  // ── Pass 4: 타겟 체인 하이라이트 ──
  if (targetChainId !== -1) {
    const pulse = 0.55 + 0.3 * Math.sin(Date.now() / 120);
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const blk = grid[r][c];
        if (!blk || blk.chainId !== targetChainId) continue;
        const x  = GX + c * CELL;
        const y  = blkY(r, c);
        ctx.save();
        ctx.globalAlpha = pulse * 0.55;
        ctx.fillStyle = '#ffffff';
        rRect(x + PAD, y + PAD, CELL - PAD * 2, CELL - PAD * 2, 6);
        ctx.fill();
        ctx.globalAlpha = pulse;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2.5;
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 10;
        rRect(x + PAD, y + PAD, CELL - PAD * 2, CELL - PAD * 2, 6);
        ctx.stroke();
        ctx.restore();
      }
    }
  }
}

function drawChar() {
  const img = SPR[char.sprFrame];
  if (!img || !img.complete) return;

  const SIZE = 56 * (char.charScale || 1.0);
  const sc = char.sc;
  ctx.save();
  ctx.translate(char.x, char.y);
  ctx.scale(sc, sc);
  ctx.drawImage(img, -SIZE / 2, -SIZE / 2, SIZE, SIZE);

  // Stun stars
  if (char.state === 'stunned') {
    const t = Date.now() / 180;
    ctx.font = '13px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < 3; i++) {
      const a = t + (i / 3) * Math.PI * 2;
      ctx.fillText('⭐', Math.cos(a) * 26, Math.sin(a) * 16 - 30);
    }
  }
  ctx.restore();
}

function drawParticles() {
  particles = particles.filter(p => p.life > 0);
  if (particles.length > MAX_PARTICLES) particles = particles.slice(-MAX_PARTICLES);
  for (const p of particles) {
    p.x  += p.vx * slowFactor;
    p.y  += p.vy * slowFactor;
    p.vy += 0.18 * slowFactor;
    p.life -= 0.04 * slowFactor;
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    if (p.isStar) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
        ctx.lineTo(Math.cos(a) * p.r, Math.sin(a) * p.r);
        const b = ((i * 4 + 2) * Math.PI) / 5 - Math.PI / 2;
        ctx.lineTo(Math.cos(b) * p.r * 0.4, Math.sin(b) * p.r * 0.4);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawFlashes() {
  flashes = flashes.filter(f => f.life > 0);
  for (const f of flashes) {
    f.life -= 0.045 * slowFactor;
    const t = Math.max(0, f.life);
    ctx.save();
    // 내부 채우기 (빠르게 사라짐)
    ctx.globalAlpha = t * t * 0.35;
    ctx.fillStyle = f.color;
    ctx.fillRect(f.x, f.y, f.w, f.h);
    // 테두리 (더 오래 남음)
    ctx.globalAlpha = t * 0.9;
    ctx.strokeStyle = f.color;
    ctx.lineWidth = 3;
    ctx.shadowColor = f.color;
    ctx.shadowBlur = 12;
    ctx.strokeRect(f.x + 1.5, f.y + 1.5, f.w - 3, f.h - 3);
    ctx.restore();
  }
}

function drawRipples() {
  ripples = ripples.filter(r => r.life > 0);
  if (ripples.length > MAX_RIPPLES) ripples = ripples.slice(-MAX_RIPPLES);
  for (const rpl of ripples) {
    rpl.rad  += 2.8 * slowFactor;
    rpl.life -= 0.06 * slowFactor;
    ctx.strokeStyle = `rgba(255,255,255,${Math.max(0, rpl.life) * 0.7})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(rpl.x, rpl.y, rpl.rad, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawPopups() {
  popups = popups.filter(p => p.life > 0);
  if (popups.length > MAX_POPUPS) popups = popups.slice(-MAX_POPUPS);
  for (const p of popups) {
    p.y    += p.vy * slowFactor;
    p.life -= 0.028 * slowFactor;
    ctx.globalAlpha = Math.min(1, p.life);
    ctx.font = p.big ? 'bold 40px system-ui' : 'bold 21px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(0,0,0,0.85)';
    ctx.lineWidth   = p.big ? 6 : 3;
    ctx.strokeText(p.text, p.x, p.y);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════
function loop(ts) {
  if (gstate === 'idle') return;
  rafID = requestAnimationFrame(loop);

  if (gstate === 'paused') {
    drawPauseOverlay();
    return;
  }

  const raw = ts - (lastTS || ts);
  const dt  = raw * slowFactor;
  lastTS = ts;

  // HP 드레인 (실시간, slowFactor 무관 elapsed 사용)
  if (gstate === 'playing') {
    gameElapsed += raw;
    updatePhase();

    // HYPER 펄스 타이머
    if (currentPhase === 3) {
      if (hyperPulseActive) {
        hyperPulseRemain -= raw;
        if (hyperPulseRemain <= 0) { hyperPulseActive = false; hyperPulseTimer = 0; }
      } else {
        hyperPulseTimer += raw;
        if (hyperPulseTimer >= PULSE_INTERVAL) {
          hyperPulseActive = true;
          hyperPulseRemain = PULSE_DURATION;
          bigPopup('PANIC!', '#ff2255');
          shake(12, 14);
        }
      }
    } else {
      hyperPulseTimer = 0; hyperPulseActive = false; hyperPulseRemain = 0;
    }

    // 강철 블럭 스폰 타이머
    steelSpawnTimer -= raw;
    if (steelSpawnTimer <= 0) {
      spawnSteel();
      steelSpawnTimer = PHASE_DEFS[Math.min(currentPhase, PHASE_DEFS.length - 1)].steelInterval;
    }

    const pulseMult  = hyperPulseActive ? 2.0 : 1.0;
    const drainRate  = (16.0 + gameElapsed / 1000 * 0.35) * char.drainMult * pulseMult;
    char.hp -= drainRate * raw / 1000;
    if (char.hp <= 0) { char.hp = 0; endGame('hp'); }
  }

  updateChar(dt);
  updateBlockAnims(dt);
  render(dt);
}

// ═══════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════
function blocksFalling() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const blk = grid[r][c];
      if (blk && blk.animY !== null && blk.animY < GY + r * CELL - 0.5) return true;
    }
  return false;
}

function handleTap(cx, cy) {
  if (gstate !== 'playing') return;
  if (char.state !== 'idle' || locked) return;
  if (blocksFalling()) return;  // 낙하 중엔 탭 무시

  const rect   = canvas.getBoundingClientRect();
  const scaleX = AW / rect.width;
  const scaleY = AH / rect.height;
  const px = (cx - rect.left) * scaleX;
  const py = (cy - rect.top)  * scaleY;

  const col = Math.floor((px - GX) / CELL);
  const row = Math.floor((py - GY) / CELL);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;

  char.tr = row; char.tc = col;
  char.tx = GX + col * CELL + CELL / 2;
  char.ty = GY + row * CELL + CELL / 2;
  const d0 = Math.sqrt((char.tx - char.x) ** 2 + (char.ty - char.y) ** 2);
  char.moveSpd = d0 / char.travelMs * 16.67;
  char.state = 'moving';
  locked = true;
  targetChainId = grid[row][col]?.chainId ?? -1;
}

canvas.addEventListener('click', e => handleTap(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  handleTap(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

// ═══════════════════════════════════════
//  START / STOP
// ═══════════════════════════════════════
function togglePause() {
  if (gstate === 'over') return;
  if (gstate === 'playing') {
    gstate = 'paused';
    document.getElementById('pause-btn').textContent = '▶';
  } else if (gstate === 'paused') {
    gstate = 'playing';
    lastTS = 0;  // prevent dt spike on resume
    document.getElementById('pause-btn').textContent = '⏸';
  }
}

function drawPauseOverlay() {
  ctx.save();
  ctx.fillStyle = 'rgba(10, 10, 30, 0.72)';
  ctx.fillRect(0, 0, AW, AH);
  ctx.fillStyle = '#fff';
  ctx.font = '700 32px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('일시정지', AW / 2, AH / 2 - 16);
  ctx.font = '400 14px sans-serif';
  ctx.fillStyle = 'rgba(200,200,220,0.7)';
  ctx.fillText('버튼을 눌러 재개', AW / 2, AH / 2 + 22);
  ctx.restore();
}

function stopGame() {
  cancelAnimationFrame(rafID);
  for (const id of pendingTimers) clearTimeout(id);
  pendingTimers.clear();
  locked = false;
  gstate = 'idle';
  document.getElementById('pause-btn').textContent = '⏸';
}

function safeTimeout(fn, ms) {
  const id = setTimeout(() => { pendingTimers.delete(id); fn(); }, ms);
  pendingTimers.add(id);
  return id;
}

function startGame() {
  stopGame();
  gstate = 'playing';
  sGold = 0; sBlocks = 0; sMaxCombo = 0; gameElapsed = 0;
  sDestroyed = { red: 0, blue: 0, yellow: 0, green: 0, purple: 0 };
  currentPhase = 0; colorCount = 3; COLORS = ALL_COLORS.slice(0, 3);
  hyperPulseTimer = 0; hyperPulseActive = false; hyperPulseRemain = 0;
  steelSpawnTimer = PHASE_DEFS[0].steelInterval;
  slowFactor = 1.0; lastTS = 0; locked = false;
  particles = []; popups = []; ripples = []; flashes = []; pendingTimers = new Set();
  shakeFr = 0; shakeAmt = 0;

  initGrid();
  initChar();
  showScreen('gc');
  rafID = requestAnimationFrame(loop);
}

function showResult() {
  const earned   = Math.max(10, sGold);
  const newGold  = getGold() + earned;
  const survived = Math.floor(gameElapsed / 1000);
  const newBest  = Math.max(getHS(), survived);
  saveGold(newGold);
  saveHS(newBest);

  document.getElementById('r-time').textContent  = survived;
  document.getElementById('r-blk').textContent   = sBlocks;
  document.getElementById('r-combo').textContent  = sMaxCombo;
  document.getElementById('r-best').textContent   = newBest;

  // 재료 정산 (블록 5개당 1개)
  const gainedMats = {};
  for (const [color, cnt] of Object.entries(sDestroyed)) {
    const g = Math.floor(cnt / 5);
    if (g > 0) gainedMats[color] = g;
  }
  addMats(gainedMats);

  const matParts = [];
  for (const [color, cnt] of Object.entries(gainedMats)) {
    if (cnt > 0) matParts.push(`${COLOR_ICON[color]}+${cnt}`);
  }
  const matsRow = document.getElementById('r-mats-row');
  if (matParts.length > 0) {
    document.getElementById('r-mats').textContent = matParts.join('  ');
    matsRow.style.display = 'flex';
  } else {
    matsRow.style.display = 'none';
  }

  // Animate gold
  let d = 0;
  const step = Math.max(1, Math.ceil(earned / 40));
  const gel  = document.getElementById('r-gold');
  const anim = setInterval(() => {
    d = Math.min(d + step, earned);
    gel.textContent = d;
    if (d >= earned) { pendingTimers.delete(anim); clearInterval(anim); }
  }, 40);
  pendingTimers.add(anim);

  showScreen('rs');
}

// ═══════════════════════════════════════
//  SHOP / UPGRADE
// ═══════════════════════════════════════
function canUpgradeStat(id) {
  const lv    = getStatLevel(id);
  const tiers = STATS[id].tiers;
  if (lv >= tiers.length - 1) return { ok: false, reason: 'MAX' };
  const next = tiers[lv + 1];
  const gold = getGold(), mats = getMats();
  if (gold < next.gold) return { ok: false, reason: `골드 부족 (${next.gold - gold}G)` };
  for (const [k, need] of Object.entries(next.mat)) {
    const have = k === 'rare' ? (mats.rare || 0) : (mats[k] || 0);
    if (have < need) return { ok: false, reason: `${COLOR_ICON[k]||'⭐'} 부족` };
  }
  return { ok: true };
}

function doUpgradeStat(id) {
  const chk = canUpgradeStat(id);
  if (!chk.ok) return;
  const lv   = getStatLevel(id);
  const next = STATS[id].tiers[lv + 1];
  const mats = getMats();
  saveGold(getGold() - next.gold);
  for (const [k, need] of Object.entries(next.mat)) {
    if (k === 'rare') mats.rare = (mats.rare || 0) - need;
    else mats[k] = (mats[k] || 0) - need;
  }
  saveMats(mats);
  saveStatLevel(id, lv + 1);
  renderUpgradeTab();
}

function shopTab(tab) {
  document.getElementById('sh-upgrade').style.display = tab === 'upgrade' ? 'flex' : 'none';
  document.getElementById('sh-deco').style.display    = tab === 'deco'    ? 'block' : 'none';
  document.getElementById('tab-up').classList.toggle('shop-tab-active',  tab === 'upgrade');
  document.getElementById('tab-dec').classList.toggle('shop-tab-active', tab === 'deco');
}

function renderUpgradeTab() {
  const gold = getGold(), mats = getMats();

  document.getElementById('sh-gold').textContent = gold.toLocaleString() + ' G 🪙';
  const matStr = Object.entries(mats).filter(([k,v])=>k!=='rare'&&v>0).map(([k,v])=>`${COLOR_ICON[k]}${v}`).join(' ');
  document.getElementById('sh-mats-line').textContent = (matStr||'재료 없음') + (mats.rare>0 ? '  ⭐'+mats.rare : '');

  const container = document.getElementById('sh-upgrade');

  function statCard(id) {
    const s    = STATS[id];
    const lv   = getStatLevel(id);
    const cur  = s.tiers[lv];
    const max  = lv >= s.tiers.length - 1;
    const next = max ? null : s.tiers[lv + 1];
    const chk  = max ? { ok: false, reason: 'MAX' } : canUpgradeStat(id);

    // 수치 표시: 연쇄속도는 낮을수록 좋으니 방향 표현 달리함
    const isSpeed     = id === 'speed';
    const isVitality  = id === 'vitality';
    const isMaxhp     = id === 'maxhp';
    const isMoveSpeed = id === 'movespeed';
    let curVal  = isVitality  ? Math.round((1 - cur.value) * 100) + '% 저항'
                : isSpeed     ? cur.value + 'ms'
                : isMaxhp     ? cur.value + ' HP'
                : isMoveSpeed ? cur.value + 'ms'
                : cur.value;
    let nextVal = '';
    if (next) {
      nextVal = isVitality  ? Math.round((1 - next.value) * 100) + '% 저항'
              : isSpeed     ? next.value + 'ms'
              : isMaxhp     ? next.value + ' HP'
              : isMoveSpeed ? next.value + 'ms'
              : next.value;
    }

    // 필요 조건 (다음 티어)
    let reqHtml = '';
    if (next) {
      reqHtml += `<span style="color:${gold>=next.gold?'#7ec850':'#ff5555'}">💰${next.gold}G</span>`;
      for (const [k, need] of Object.entries(next.mat)) {
        const have = k === 'rare' ? (mats.rare||0) : (mats[k]||0);
        const ok = have >= need;
        reqHtml += ` <span style="color:${ok?'#7ec850':'#ff5555'}">${COLOR_ICON[k]||'⭐'}${need}</span>`;
      }
    }

    const tierDots = s.tiers.map((_,i) =>
      `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${i<=lv?'#f0c040':'rgba(255,255,255,0.15)'};margin:0 2px"></span>`
    ).join('');

    return `<div class="stats-box" style="padding:12px 15px;gap:6px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:15px;font-weight:700;color:#e0e0f0">${s.icon} ${s.name}</span>
        <span style="font-size:11px;color:#606080">${tierDots}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:13px">
        <span style="color:#9090b0">${s.desc}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;font-size:14px">
        <span style="color:#ccc">${curVal}</span>
        ${next ? `<span style="color:#505070">→</span><span style="color:#7ec850;font-weight:700">${nextVal}</span>` : ''}
      </div>
      ${next ? `<div style="font-size:12px;color:#9090b0;margin-top:2px">${reqHtml}</div>` : ''}
      ${max
        ? `<div style="text-align:center;color:#f0c040;font-size:12px;font-weight:700;padding:4px 0">✅ MAX</div>`
        : `<button class="btn ${chk.ok?'btn-p':'btn-s'}" onclick="doUpgradeStat('${id}')"
             style="padding:8px;font-size:13px${chk.ok?'':';opacity:.5;cursor:not-allowed'}">
             ${chk.ok ? '업그레이드' : chk.reason}
           </button>`
      }
    </div>`;
  }

  container.innerHTML = Object.keys(STATS).map(statCard).join('');
}

function showShop() {
  stopGame();
  showScreen('ss');
  shopTab('upgrade');
  renderUpgradeTab();
}


function openResetPopup()  { document.getElementById('reset-popup').classList.remove('hidden'); }
function closeResetPopup() { document.getElementById('reset-popup').classList.add('hidden'); }

function doReset(type) {
  closeResetPopup();
  if (type === 'all') {
    Object.values(SK).forEach(k => localStorage.removeItem(k));
  } else {
    // 강화만: 골드·재료·스탯 삭제, 기록(hs) 유지
    [SK.gold, SK.mats, SK.stats].forEach(k => localStorage.removeItem(k));
  }
  renderUpgradeTab();
  showMain();
}

// ═══════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════
showMain();
</script>
